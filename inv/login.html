<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login Admin | JUJU & OJAN</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Tailwind Configuration -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#0f2d4a",
                        "background": "#0a141f",
                        "tertiary": "#d2c6a0",
                        "primary-fixed-dim": "#aec9ed",
                        "secondary-fixed": "#ffe08f",
                        "surface-dim": "#0a141f",
                        "on-secondary-container": "#fdd977",
                        "text-light": "#3d5a7a",
                        "surface-container-highest": "#2c3542",
                        "primary-fixed": "#d2e4ff",
                        "gold-light": "#e8c97a",
                        "on-surface-variant": "#c3c6ce",
                        "secondary-container": "#785d00",
                        "on-tertiary-container": "#9d926f",
                        "secondary": "#e6c364",
                        "on-secondary-fixed": "#241a00",
                        "surface-cream-dark": "#dde6f2",
                        "on-secondary-fixed-variant": "#584400",
                        "on-primary-container": "#7a95b7",
                        "on-secondary": "#3d2e00",
                        "inverse-primary": "#466080",
                        "on-tertiary-fixed-variant": "#4e4629",
                        "on-background": "#d9e3f3",
                        "midnight-deep": "#071929",
                        "on-error": "#690005",
                        "surface-container": "#17202c",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "surface-cream": "#f0f4fa",
                        "on-primary-fixed": "#001d36",
                        "inverse-on-surface": "#27313d",
                        "surface-bright": "#303a46",
                        "tertiary-fixed-dim": "#d2c6a0",
                        "outline-variant": "#43474d",
                        "on-surface": "#d9e3f3",
                        "midnight-interactive": "#1a4a72",
                        "surface-variant": "#2c3542",
                        "on-tertiary-fixed": "#211b04",
                        "surface-container-high": "#212b37",
                        "primary": "#aec9ed",
                        "on-error-container": "#ffdad6",
                        "surface-tint": "#aec9ed",
                        "tertiary-container": "#322b10",
                        "inverse-surface": "#d9e3f3",
                        "surface-container-low": "#121c28",
                        "surface": "#0a141f",
                        "outline": "#8d9198",
                        "tertiary-fixed": "#efe2ba",
                        "on-primary": "#15324f",
                        "on-primary-fixed-variant": "#2e4867",
                        "on-tertiary": "#373015",
                        "secondary-fixed-dim": "#e6c364",
                        "surface-container-lowest": "#050f1a"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                    fontFamily: {
                        "label-overline": ["Cinzel"],
                        "body-standard": ["Lato"],
                        "body-small": ["Lato"]
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-surface/80 backdrop-blur-md border border-secondary/20 shadow-[0_0_15px_rgba(230,195,100,0.05)];
            }
            .card-gold-border {
                @apply border border-secondary/30 rounded-xl overflow-hidden bg-surface-container relative;
            }
            .card-gold-border::before {
                content: '';
                @apply absolute top-0 left-0 w-2 h-2 border-t border-l border-secondary/50;
            }
            .card-gold-border::after {
                content: '';
                @apply absolute bottom-0 right-0 w-2 h-2 border-b border-r border-secondary/50;
            }
            .btn-gold {
                @apply bg-secondary text-on-secondary px-6 py-2 rounded-md font-label-overline text-[12px] tracking-widest uppercase transition-all duration-300 hover:shadow-[0_0_10px_rgba(230,195,100,0.3)] hover:scale-[1.02];
            }
            .input-field {
                @apply w-full bg-surface-container-highest border border-outline-variant rounded px-4 py-3 text-on-surface font-body-standard focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-colors;
            }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-standard overflow-hidden h-screen flex items-center justify-center bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-midnight-interactive/20 via-background to-background relative p-4">
    
    <div class="card-gold-border p-8 w-full max-w-md glass-panel z-10">
        <div class="text-center mb-8">
            <h1 class="font-label-overline text-secondary tracking-widest mb-2 text-2xl uppercase">JUJU & OJAN</h1>
            <p class="font-body-small text-text-light">Admin Dashboard Portal</p>
        </div>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block font-body-small text-text-light mb-2">Email</label>
                <input id="email" class="input-field" placeholder="admin@jujuojan.id" type="email" required />
            </div>
            <div>
                <label class="block font-body-small text-text-light mb-2">Password</label>
                <input id="password" class="input-field" placeholder="••••••••" type="password" required />
            </div>
            
            <div id="error-message" class="text-error text-sm hidden font-body-small text-center">Login gagal. Periksa kembali email dan password.</div>
            
            <div class="flex flex-col gap-3 mt-4">
                <button type="submit" id="submit-btn" class="btn-gold w-full flex justify-center items-center py-3 font-bold">
                    Masuk
                </button>
            </div>
        </form>
        
        <div class="mt-4 pt-4 border-t border-outline-variant/30">
            <button type="button" id="open-register-btn" onclick="document.getElementById('register-modal').showModal()" class="btn-outline-gold w-full flex justify-center items-center py-3 font-bold">
                Daftar Akun Baru
            </button>
        </div>
    </div>

    <!-- Register Modal -->
    <dialog id="register-modal" class="bg-transparent backdrop:bg-background/80 backdrop:backdrop-blur-sm p-4 w-full max-w-md m-auto outline-none rounded-xl open:flex flex-col">
        <div class="card-gold-border p-8 w-full glass-panel relative shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-label-overline text-secondary tracking-widest text-xl">Daftar Akun</h2>
                <button type="button" id="close-register-btn" onclick="document.getElementById('register-modal').close()" class="text-text-light hover:text-secondary">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <form id="register-form" class="space-y-4">
                <div>
                    <label class="block font-body-small text-text-light mb-1">Email</label>
                    <input id="reg-email" class="input-field" type="email" required />
                </div>
                <div>
                    <label class="block font-body-small text-text-light mb-1">Password</label>
                    <input id="reg-password" class="input-field" type="password" required minlength="6" />
                </div>
                
                <div id="reg-error-message" class="text-error text-sm hidden font-body-small"></div>
                <div id="reg-success-message" class="text-primary text-sm hidden font-body-small">Pendaftaran berhasil! Hubungi Admin untuk meminta persetujuan akses.</div>
                
                <button type="submit" id="reg-submit-btn" class="btn-gold w-full flex justify-center items-center py-3 mt-4 font-bold">
                    Daftar
                </button>
            </form>
        </div>
    </dialog>

    <script>
        const SUPABASE_URL = 'https://ubzdmnjbacsomhgugwcb.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InViemRtbmpiYWNzb21oZ3Vnd2NiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MDgzNzcsImV4cCI6MjA5NTE4NDM3N30._qCp0UjSylgE0ffkkRW5TMusKGerh2Nmwbg1hSN4Y_c';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }
        checkSession();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-message');
            
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.classList.remove('hidden');
                errorMsg.innerText = error.message;
                btn.innerHTML = 'Masuk';
                btn.disabled = false;
            } else {
                window.location.href = 'dashboard.html';
            }
        });

        // Register Form Handler
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const btn = document.getElementById('reg-submit-btn');
            const errorMsg = document.getElementById('reg-error-message');
            const successMsg = document.getElementById('reg-success-message');
            
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.classList.remove('hidden');
                errorMsg.innerText = error.message;
            } else {
                successMsg.classList.remove('hidden');
                document.getElementById('register-form').reset();
            }
            btn.innerHTML = 'Daftar';
            btn.disabled = false;
        });
    </script>
</body>
</html>
