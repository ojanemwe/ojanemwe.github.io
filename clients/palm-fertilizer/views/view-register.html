<div class="spa-view active" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#065f46 0%,#0a0f0d 50%,#1e3a5f 100%)">
  <div class="login-card">
    <div class="login-logo">
      <div style="width:56px;height:56px;background:var(--primary);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem"><i data-lucide="user-plus" style="width:28px;height:28px;color:#fff"></i></div>
      <h1 style="font-size:1.5rem">Daftar Akun</h1>
      <p>Akun baru memerlukan persetujuan Admin</p>
    </div>
    <label>Nama Lengkap</label><input type="text" id="reg-nama" placeholder="Nama lengkap">
    <label>No Telepon</label><input type="tel" id="reg-telp" placeholder="08xxx">
    <label>Username</label><input type="text" id="reg-user" placeholder="Username unik">
    <label>Password</label><input type="password" id="reg-pass" placeholder="Password">
    <label>Role yang Diinginkan</label>
    <select id="reg-role"><option value="CHECKER">CHECKER</option><option value="MANDOR">MANDOR</option></select>
    <button class="btn btn-primary btn-block mt-2" onclick="register()"><i data-lucide="send" class="icon-sm"></i> Kirim Pendaftaran</button>
    <div class="text-center mt-2"><a href="#" onclick="event.preventDefault();UI.showLogin()">← Kembali ke Login</a></div>
  </div>
</div>
<script>
window.register = function() {
  const nama = document.getElementById('reg-nama').value;
  const user = document.getElementById('reg-user').value;
  if (!nama || !user) { UI.toast('Lengkapi semua field!', 'error'); return; }
  UI.toast('Pendaftaran dikirim! Menunggu persetujuan Admin.', 'success');
  setTimeout(() => UI.showLogin(), 2000);
};
if (window.lucide) lucide.createIcons();
</script>
