<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Meta Tag SEO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }
        .code-block {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="bg-white border-b border-slate-200 py-4 mb-8 sticky top-0 z-10">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 flex items-center gap-2">
                <i class="fas fa-search"></i> SEO Meta Generator
            </h1>
            <span class="text-xs font-medium bg-blue-100 text-blue-700 px-2 py-1 rounded-full">v1.0</span>
        </div>
    </nav>

    <main class="container mx-auto px-4 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- FORM SECTION -->
            <div class="space-y-6">
                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-lg font-semibold text-slate-800 mb-4 border-b pb-2">Informasi Dasar</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Judul Halaman (Brand - Keyword)</label>
                            <input type="text" id="brandTitle" placeholder="Contoh: Toko Sepatu - Jual Sepatu Lari Original" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                oninput="updateTags()">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-sm font-medium text-slate-700">Meta Deskripsi</label>
                                <span id="charCount" class="text-xs text-slate-500">0 / 160</span>
                            </div>
                            <textarea id="metaDesc" rows="3" placeholder="Deskripsi singkat yang menggoda audiens..." 
                                class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                oninput="updateTags()"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">URL Kanonikal</label>
                            <input type="text" id="canonicalUrl" placeholder="https://domainanda.com/halaman-ini" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                                oninput="updateTags()">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl shadow-sm">
                    <div class="flex items-center gap-2 mb-4 border-b pb-2">
                        <i class="fab fa-facebook text-blue-600"></i>
                        <h2 class="text-lg font-semibold text-slate-800">Media Sosial (Open Graph)</h2>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="syncSocial" checked class="w-4 h-4 text-blue-600 rounded" onchange="toggleSync()">
                            <label for="syncSocial" class="text-sm text-slate-600">Samakan dengan deskripsi utama</label>
                        </div>
                        <div id="socialFields" class="space-y-4 hidden">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Judul Sosmed</label>
                                <input type="text" id="ogTitle" class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none" oninput="updateTags()">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Deskripsi Sosmed</label>
                                <textarea id="ogDesc" rows="2" class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none" oninput="updateTags()"></textarea>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">URL Gambar Preview (OG Image)</label>
                            <input type="text" id="ogImage" placeholder="https://domainanda.com/assets/og-image.jpg" 
                                class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none" oninput="updateTags()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- OUTPUT SECTION -->
            <div class="space-y-6 lg:sticky lg:top-24 h-fit">
                <div class="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-lg mb-4">
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <i class="fas fa-exclamation-triangle text-amber-400"></i>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm text-amber-700 font-medium">
                                Instruksi Penempatan:
                            </p>
                            <p class="text-xs text-amber-600 mt-1">
                                Letakkan kode di bawah ini tepat di bawah penutup tag <code class="bg-amber-100 px-1 rounded">&lt;/title&gt;</code> di dalam bagian <code class="bg-amber-100 px-1 rounded">&lt;head&gt;</code> website Anda.
                            </p>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-2xl overflow-hidden shadow-xl">
                    <div class="flex justify-between items-center bg-slate-800 px-4 py-2">
                        <span class="text-xs font-mono text-slate-400 uppercase tracking-wider">Generated Meta Tags</span>
                        <button onclick="copyToClipboard()" class="text-xs flex items-center gap-1 text-white bg-blue-600 hover:bg-blue-700 px-3 py-1 rounded transition">
                            <i class="far fa-copy"></i> Copy Code
                        </button>
                    </div>
                    <pre id="outputCode" class="p-6 text-sm overflow-x-auto code-block min-h-[400px]"><code></code></pre>
                </div>

                <div id="toast" class="fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-xl shadow-lg transform translate-y-20 transition-transform duration-300 flex items-center gap-2">
                    <i class="fas fa-check-circle"></i> Berhasil disalin ke papan klip!
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSync() {
            const isSynced = document.getElementById('syncSocial').checked;
            const socialFields = document.getElementById('socialFields');
            if (isSynced) {
                socialFields.classList.add('hidden');
            } else {
                socialFields.classList.remove('hidden');
            }
            updateTags();
        }

        function updateTags() {
            const brandTitle = document.getElementById('brandTitle').value || "Nama Brand - Keyword Utama";
            const metaDesc = document.getElementById('metaDesc').value || "Deskripsi singkat yang menggoda (Max 160 karakter).";
            const canonicalUrl = document.getElementById('canonicalUrl').value || "https://domainanda.com/halaman-ini";
            const ogImage = document.getElementById('ogImage').value || "https://domainanda.com/assets/og-image.jpg";
            
            const isSynced = document.getElementById('syncSocial').checked;
            const finalOgTitle = isSynced ? brandTitle : (document.getElementById('ogTitle').value || brandTitle);
            const finalOgDesc = isSynced ? metaDesc : (document.getElementById('ogDesc').value || metaDesc);

            // Update Char Count
            const count = metaDesc.length;
            const countEl = document.getElementById('charCount');
            countEl.innerText = `${count} / 160`;
            countEl.className = count > 160 ? 'text-xs text-red-500 font-bold' : 'text-xs text-slate-500';

            const code = `<!-- Meta Tags Generated for SEO -->
<meta name="title" content="${brandTitle}">
<meta name="description" content="${metaDesc}">
<meta name="robots" content="index, follow">
<link rel="canonical" href="${canonicalUrl}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="${canonicalUrl}">
<meta property="og:title" content="${finalOgTitle}">
<meta property="og:description" content="${finalOgDesc}">
<meta property="og:image" content="${ogImage}">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="${canonicalUrl}">
<meta property="twitter:title" content="${finalOgTitle}">
<meta property="twitter:description" content="${finalOgDesc}">
<meta property="twitter:image" content="${ogImage}">`;

            document.getElementById('outputCode').querySelector('code').innerText = code;
        }

        function copyToClipboard() {
            const code = document.getElementById('outputCode').innerText;
            const textArea = document.createElement("textarea");
            textArea.value = code;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20');
            setTimeout(() => {
                toast.classList.add('translate-y-20');
            }, 3000);
        }

        // Initialize on load
        window.onload = updateTags;
    </script>
</body>
</html>
