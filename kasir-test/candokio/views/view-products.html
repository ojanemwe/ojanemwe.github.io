<!-- ============================================================================
     VIEW: PRODUK — Manajemen Produk, Kategori & Satuan
     ============================================================================ -->

<div class="page-header">
    <h2>Manajemen Produk</h2>
    <div class="btn-group">
        <button class="btn btn-outline btn-sm" id="prod-btn-template" title="Download Template CSV">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Template
        </button>
        <button class="btn btn-outline btn-sm" id="prod-btn-import" title="Import dari CSV">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Import
        </button>
        <button class="btn btn-outline btn-sm" id="prod-btn-export">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
        </button>
        <button class="btn btn-primary btn-sm" id="prod-btn-add">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Tambah Produk
        </button>
    </div>
    <input type="file" id="prod-csv-input" accept=".csv" style="display:none;">
</div>

<!-- Tabs: Produk / Kategori / Satuan -->
<div class="tab-nav">
    <button class="tab-btn active" data-tab="tab-produk">Produk</button>
    <button class="tab-btn" data-tab="tab-kategori">Kategori</button>
    <button class="tab-btn" data-tab="tab-satuan">Satuan</button>
</div>

<!-- Tab: Produk -->
<div id="tab-produk">
    <div class="filter-bar">
        <input type="search" id="prod-search" placeholder="Cari nama, SKU, atau barcode..." style="flex:1; min-width:200px;">
        <select id="prod-filter-cat" style="min-width:140px;">
            <option value="">Semua Kategori</option>
        </select>
        <select id="prod-filter-stock" style="min-width:120px;">
            <option value="">Semua Stok</option>
            <option value="low">⚠️ Stok Menipis</option>
            <option value="out">❌ Habis</option>
        </select>
    </div>

    <div class="card">
        <div class="table-container table-desktop">
            <table>
                <thead>
                    <tr>
                        <th style="width:50px;">Foto</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>SKU</th>
                        <th style="text-align:right;">Harga</th>
                        <th style="text-align:right;">Cost</th>
                        <th style="text-align:center;">Stok</th>
                        <th style="width:90px;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="prod-table-body">
                    <tr><td colspan="8" class="text-center text-muted" style="padding:2rem;">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <!-- Mobile list -->
        <div id="prod-mobile-list"></div>
        <!-- Pagination -->
        <div style="display:flex; justify-content:space-between; align-items:center; padding:0.75rem 1rem; border-top:1px solid var(--border-color); font-size:0.8125rem;">
            <span id="prod-page-info" class="text-muted"><span class="desktop-only">Halaman </span>1 dari 1</span>
            <div class="btn-group">
                <button class="btn btn-outline btn-sm" id="prod-prev">« Prev</button>
                <button class="btn btn-outline btn-sm" id="prod-next">Next »</button>
            </div>
        </div>
    </div>
</div>

<!-- Tab: Kategori -->
<div id="tab-kategori" class="hidden">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Daftar Kategori</h4>
            <button class="btn btn-primary btn-sm" id="cat-btn-add">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Tambah
            </button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>ID</th><th>Nama Kategori</th><th style="width:100px;">Aksi</th></tr></thead>
                <tbody id="cat-table-body">
                    <tr><td colspan="3" class="text-center text-muted" style="padding:2rem;">Memuat...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Tab: Satuan -->
<div id="tab-satuan" class="hidden">
    <div class="card">
        <div class="card-header">
            <h4 class="card-title">Daftar Satuan</h4>
            <button class="btn btn-primary btn-sm" id="unit-btn-add">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Tambah
            </button>
        </div>
        <div class="table-container table-desktop">
            <table>
                <thead><tr><th>ID</th><th>Nama Satuan</th><th>Jumlah/Konversi</th><th style="width:100px;">Aksi</th></tr></thead>
                <tbody id="unit-table-body">
                    <tr><td colspan="4" class="text-center text-muted" style="padding:2rem;">Memuat...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="unit-mobile-list"></div>
    </div>
</div>

<!-- Modal Form Produk -->
<div class="modal-overlay" id="prod-modal">
    <div class="modal-content" style="max-width:560px;">
        <div class="modal-header">
            <h3 id="prod-modal-title">Tambah Produk</h3>
            <button class="modal-close" id="prod-modal-close"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
            <form id="prod-form">
                <input type="hidden" id="pf-id">
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="pf-nama">Nama Produk *</label>
                        <input type="text" id="pf-nama" required>
                    </div>
                    <div class="form-group">
                        <label for="pf-kategori">Kategori</label>
                        <select id="pf-kategori"><option value="">-Pilih-</option></select>
                    </div>
                </div>
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="pf-sku">SKU</label>
                        <input type="text" id="pf-sku" placeholder="Opsional">
                    </div>
                    <div class="form-group">
                        <label for="pf-barcode">Barcode</label>
                        <input type="text" id="pf-barcode" placeholder="Opsional">
                    </div>
                </div>
                    <div class="form-group">
                        <label for="pf-satuan">Satuan</label>
                        <select id="pf-satuan"></select>
                    </div>
                    <div class="form-group">
                        <label>Produk Induk (Turunan)</label>
                        <div style="position:relative;">
                            <input type="text" id="pf-related-visible" autocomplete="off" placeholder="Ketik nama produk induk..." style="width:100%; border: 1px solid var(--input-border); padding: 0.55rem 0.75rem; border-radius: var(--radius-md);">
                            <div id="pf-related-dropdown" style="display:none; position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:100; max-height:200px; overflow-y:auto; background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-md); box-shadow:var(--shadow-md);"></div>
                            <input type="hidden" id="pf-related">
                        </div>
                    </div>
                <div class="grid grid-3">
                    <div class="form-group">
                        <label for="pf-harga">Harga Jual *</label>
                        <input type="number" id="pf-harga" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="pf-cost">Harga Beli (Cost)</label>
                        <input type="number" id="pf-cost" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label for="pf-stok">Stok *</label>
                        <input type="number" id="pf-stok" min="0" required>
                    </div>
                </div>
                <div class="grid grid-2">
                    <div class="form-group">
                        <label for="pf-stok-min">Stok Minimum</label>
                        <input type="number" id="pf-stok-min" min="0" value="5">
                    </div>
                    <div class="form-group">
                        <label>Favorit?</label>
                        <label style="font-weight:400; cursor:pointer; display:flex; align-items:center; gap:0.5rem; margin-top:0.35rem;">
                            <input type="checkbox" id="pf-favorit"> Ya, tandai favorit
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="pf-deskripsi">Deskripsi</label>
                    <textarea id="pf-deskripsi" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Foto Produk</label>
                    <input type="file" id="pf-foto" accept="image/*" style="font-size:0.8125rem;">
                    <div class="form-hint">Max 50KB setelah kompresi. Format: JPEG/WebP.</div>
                    <img id="pf-foto-preview" src="" style="display:none; width:80px; height:80px; object-fit:cover; border-radius:var(--radius-sm); margin-top:0.5rem; border:1px solid var(--border-color);">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" id="prod-modal-cancel">Batal</button>
            <button class="btn btn-primary" id="prod-modal-save">Simpan</button>
        </div>
    </div>
</div>

<!-- Modal Detail Produk (Mobile) -->
<div class="modal-overlay" id="prod-detail-modal">
    <div class="modal-content" style="max-width:400px;">
        <div class="modal-header">
            <h3>Detail Produk</h3>
            <button class="modal-close" onclick="document.getElementById('prod-detail-modal').classList.remove('active')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body" id="prod-detail-content"></div>
    </div>
</div>

<script>
(function() {
    'use strict';

    let allProducts = [];
    let categories = [];
    let units = [];
    let prodCurrentPage = 1;
    let perPage = parseInt(localStorage.getItem('candokio_per_page')) || 50;

    // --- Tab Navigation ---
    document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const tabId = this.getAttribute('data-tab');
            ['tab-produk', 'tab-kategori', 'tab-satuan'].forEach(id => {
                document.getElementById(id).classList.toggle('hidden', id !== tabId);
            });
        });
    });

    // --- Load Data ---
    async function loadAll() {
        try {
            const data = await OfflineService.cachedBulkRead(['Produk', 'Kategori_Produk', 'Satuan_Produk']);
            allProducts = data.Produk || [];
            categories = data.Kategori_Produk || [];
            units = data.Satuan_Produk || [];

            // Kalkulasi real-time stok dan cost produk turunan (Varian)
            allProducts.forEach(p => {
                if (p.satuan && p.satuan !== 'Pcs' && p.satuan !== '' && p.related_product_id) {
                    const parentItem = allProducts.find(parent => parent.id === p.related_product_id);
                    const unitObj = units.find(u => u.nama === p.satuan);
                    if (parentItem && unitObj) {
                        const qty = parseInt(unitObj.jumlah) || 1;
                        p.cost = parseFloat(parentItem.cost || 0) * qty;
                        p.stok = Math.floor((parseInt(parentItem.stok) || 0) / qty);
                    }
                }
            });

            renderProducts();
            renderCategories();
            renderUnits();
            populateDropdowns();
        } catch (e) {
            showToast('Gagal memuat data: ' + e.message, 'error');
        }
    }

    // --- Render Products Table ---
    function renderProducts() {
        let filtered = [...allProducts];
        const search = (document.getElementById('prod-search').value || '').toLowerCase();
        const catFilter = document.getElementById('prod-filter-cat').value;
        const stockFilter = document.getElementById('prod-filter-stock').value;

        if (search) filtered = filtered.filter(p => 
            (p.nama||'').toLowerCase().includes(search) || 
            (p.sku||'').toLowerCase().includes(search) || 
            (p.barcode||'').toString().toLowerCase().includes(search) || 
            (p.deskripsi||'').toLowerCase().includes(search)
        );
        if (catFilter) filtered = filtered.filter(p => p.kategori === catFilter);
        if (stockFilter === 'low') filtered = filtered.filter(p => { const s = parseInt(p.stok)||0; const m = parseInt(p.stok_minimum)||5; return s > 0 && s <= m; });
        if (stockFilter === 'out') filtered = filtered.filter(p => (parseInt(p.stok)||0) <= 0);

        // Pagination
        const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
        if (prodCurrentPage > totalPages) prodCurrentPage = totalPages;
        const startIdx = (prodCurrentPage - 1) * perPage;
        const paged = filtered.slice(startIdx, startIdx + perPage);
        document.getElementById('prod-page-info').innerHTML = `<span class="desktop-only">Halaman </span>${prodCurrentPage} dari ${totalPages} (${filtered.length} produk)`;
        document.getElementById('prod-prev').disabled = prodCurrentPage <= 1;
        document.getElementById('prod-next').disabled = prodCurrentPage >= totalPages;

        const tbody = document.getElementById('prod-table-body');
        const mobileList = document.getElementById('prod-mobile-list');

        if (paged.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted" style="padding:2rem;">Tidak ada produk ditemukan</td></tr>';
            mobileList.innerHTML = '<div class="empty-state"><p>Tidak ada produk</p></div>';
            return;
        }

        tbody.innerHTML = paged.map(p => {
            const stok = parseInt(p.stok)||0;
            const stokMin = parseInt(p.stok_minimum)||5;
            const stokBadge = stok <= 0 ? '<span class="badge badge-danger">Habis</span>' : (stok <= stokMin ? '<span class="badge badge-warning">' + stok + '</span>' : stok);
            const img = p.foto_base64 ? `<img src="${p.foto_base64}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;">` : '<div style="width:36px;height:36px;background:var(--bg-surface-alt);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:var(--text-muted);">📦</div>';
            return `<tr>
                <td>${img}</td>
                <td><strong>${escapeHtml(p.nama)}</strong>${p.favorit === 'true' || p.favorit === true ? ' ⭐' : ''}</td>
                <td>${escapeHtml(p.kategori || '-')}</td>
                <td><code style="font-size:0.75rem;">${escapeHtml(p.sku || '-')}</code></td>
                <td style="text-align:right;">${formatCurrency(p.harga)}</td>
                <td style="text-align:right;">${formatCurrency(p.cost)}</td>
                <td style="text-align:center;">${stokBadge}</td>
                <td>
                    <div class="btn-group">
                        <button class="btn btn-ghost btn-sm" onclick="window._prodEdit('${p.id}')" title="Edit">✏️</button>
                        <button class="btn btn-ghost btn-sm" onclick="window._prodDelete('${p.id}')" title="Hapus">🗑️</button>
                    </div>
                </td>
            </tr>`;
        }).join('');

        // Mobile list
        mobileList.innerHTML = paged.map(p => {
            const stok = parseInt(p.stok)||0;
            const stokMin = parseInt(p.stok_minimum)||5;
            const badge = stok <= 0 ? '<span class="badge badge-danger">Habis</span>' : (stok <= stokMin ? '<span class="badge badge-warning">' + stok + '</span>' : '');
            return `<div class="table-mobile-row" onclick="window._prodDetail('${p.id}')">
                <div style="flex:1;min-width:0;">
                    <div class="mobile-row-main truncate">${escapeHtml(p.nama)}${p.favorit === 'true' ? ' ⭐' : ''}</div>
                    <div class="mobile-row-sub">${formatCurrency(p.harga)} • Stok: ${stok}</div>
                </div>
                <div class="mobile-row-badge">${badge}</div>
            </div>`;
        }).join('');
    }

    // --- Filter Events ---
    document.getElementById('prod-prev').addEventListener('click', () => { if(prodCurrentPage>1){prodCurrentPage--;renderProducts();} });
    document.getElementById('prod-next').addEventListener('click', () => { prodCurrentPage++;renderProducts(); });
    document.getElementById('prod-search').addEventListener('input', () => { prodCurrentPage=1; renderProducts(); });
    document.getElementById('prod-filter-cat').addEventListener('change', () => { prodCurrentPage=1; renderProducts(); });
    document.getElementById('prod-filter-stock').addEventListener('change', () => { prodCurrentPage=1; renderProducts(); });

    // --- Populate Dropdowns ---
    function populateDropdowns() {
        // Filter dropdown
        const filterCat = document.getElementById('prod-filter-cat');
        filterCat.innerHTML = '<option value="">Semua Kategori</option>' + categories.map(c => `<option value="${escapeHtml(c.nama_kategori)}">${escapeHtml(c.nama_kategori)}</option>`).join('');

        // Form dropdowns (Kategori) - Tambahkan opsi + Tambah Kategori Baru
        let catOpts = '<option value="">-Pilih-</option>' + categories.map(c => `<option value="${escapeHtml(c.nama_kategori)}">${escapeHtml(c.nama_kategori)}</option>`).join('');
        catOpts += '<optgroup label="Tindakan"><option value="__NEW__" style="color:var(--primary); font-weight:bold;">+ Tambah Kategori Baru</option></optgroup>';
        document.getElementById('pf-kategori').innerHTML = catOpts;

        // Form dropdowns (Satuan) - Pastikan Pcs ada dan hilangkan -Pilih-
        let unitOpts = units.map(u => `<option value="${escapeHtml(u.nama)}">${escapeHtml(u.nama)}</option>`).join('');
        if (!units.find(u => u.nama.toLowerCase() === 'pcs')) {
            unitOpts = '<option value="Pcs">Pcs</option>' + unitOpts;
        }
        unitOpts += '<optgroup label="Tindakan"><option value="__NEW__" style="color:var(--primary); font-weight:bold;">+ Tambah Satuan Baru</option></optgroup>';
        document.getElementById('pf-satuan').innerHTML = unitOpts;
    }

    // --- Add/Edit Product Modal ---
    function openProductModal(product) {
        const modal = document.getElementById('prod-modal');
        document.getElementById('prod-modal-title').textContent = product ? 'Edit Produk' : 'Tambah Produk';
        document.getElementById('pf-id').value = product ? product.id : '';
        document.getElementById('pf-nama').value = product ? product.nama : '';
        document.getElementById('pf-kategori').value = product ? product.kategori : '';
        document.getElementById('pf-sku').value = product ? product.sku : '';
        document.getElementById('pf-barcode').value = product ? product.barcode : '';
        document.getElementById('pf-satuan').value = product && product.satuan ? product.satuan : 'Pcs';
        document.getElementById('pf-related').value = product ? (product.related_product_id || '') : '';
        
        if (product && product.related_product_id) {
            const parentItem = allProducts.find(p => p.id === product.related_product_id);
            document.getElementById('pf-related-visible').value = parentItem ? parentItem.nama : '';
        } else {
            document.getElementById('pf-related-visible').value = '';
        }

        document.getElementById('pf-harga').value = product ? product.harga : '';
        document.getElementById('pf-cost').value = product ? (product.cost || 0) : 0;
        document.getElementById('pf-stok').value = product ? product.stok : '';
        document.getElementById('pf-stok-min').value = product ? (product.stok_minimum || 5) : 5;
        document.getElementById('pf-favorit').checked = product ? (product.favorit === true || product.favorit === 'true') : false;
        document.getElementById('pf-deskripsi').value = product ? (product.deskripsi || '') : '';

        const preview = document.getElementById('pf-foto-preview');
        if (product && product.foto_base64) { preview.src = product.foto_base64; preview.style.display = 'block'; }
        else { preview.style.display = 'none'; }

        document.getElementById('pf-foto').value = '';
        modal.classList.add('active');
        updateVariantCalculations(false);
    }

    function updateVariantCalculations(userTriggered = false) {
        const satuanVal = document.getElementById('pf-satuan').value;
        const relatedVal = document.getElementById('pf-related').value;
        const relatedVisible = document.getElementById('pf-related-visible');
        const costInput = document.getElementById('pf-cost');
        const stokInput = document.getElementById('pf-stok');

        if (satuanVal && satuanVal !== 'Pcs' && satuanVal !== '__NEW__') {
            costInput.readOnly = true;
            stokInput.readOnly = true;
            costInput.style.backgroundColor = 'var(--bg-surface-alt)';
            stokInput.style.backgroundColor = 'var(--bg-surface-alt)';
            
            relatedVisible.disabled = false;
            relatedVisible.style.backgroundColor = '';
            relatedVisible.placeholder = "Ketik nama produk induk...";
            
            if (relatedVal) {
                const parentItem = allProducts.find(p => p.id === relatedVal);
                const unitObj = units.find(u => u.nama === satuanVal);
                if (parentItem && unitObj) {
                    const qty = parseInt(unitObj.jumlah) || 1;
                    costInput.value = parseFloat(parentItem.cost || 0) * qty;
                    stokInput.value = Math.floor((parseInt(parentItem.stok) || 0) / qty);
                }
            } else {
                if (userTriggered) {
                    costInput.value = '';
                    stokInput.value = '';
                }
            }
        } else {
            // Jika Pcs atau -Pilih-
            costInput.readOnly = false;
            stokInput.readOnly = false;
            costInput.style.backgroundColor = '';
            stokInput.style.backgroundColor = '';
            
            relatedVisible.disabled = true;
            relatedVisible.style.backgroundColor = 'var(--bg-surface-alt)';
            relatedVisible.placeholder = "Disabled (Satuan adalah Pcs)";
            
            if (userTriggered) {
                document.getElementById('pf-related').value = '';
                relatedVisible.value = '';
                costInput.value = '';
                stokInput.value = '';
            }
        }
    }

    // Autocomplete Logic
    const relatedInput = document.getElementById('pf-related-visible');
    const relatedDropdown = document.getElementById('pf-related-dropdown');
    const relatedVal = document.getElementById('pf-related');

    function renderRelatedDropdown(keyword = '') {
        const lower = keyword.toLowerCase();
        let html = '';
        let count = 0;
        for(let p of allProducts) {
             if(p.nama.toLowerCase().includes(lower) || (p.sku && p.sku.toLowerCase().includes(lower))) {
                  html += `<div class="related-item" data-id="${p.id}" data-nama="${escapeHtml(p.nama)}" style="padding:0.75rem; cursor:pointer; border-bottom:1px solid var(--border-color);">${escapeHtml(p.nama)} <small style="color:var(--text-muted)">(${escapeHtml(p.sku||'-')})</small></div>`;
                  count++;
             }
             if(count >= 20) break;
        }
        if(!html) html = '<div style="padding:0.75rem; color:var(--text-muted);">Tidak ditemukan</div>';
        relatedDropdown.innerHTML = html;
        
        relatedDropdown.querySelectorAll('.related-item').forEach(el => {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                relatedInput.value = this.getAttribute('data-nama');
                relatedVal.value = this.getAttribute('data-id');
                relatedDropdown.style.display = 'none';
                updateVariantCalculations(true); 
            });
            // Hover effect

    // --- Import CSV ---
    document.getElementById('prod-btn-import').addEventListener('click', () => {
        document.getElementById('prod-csv-input').click();
    });

    document.getElementById('prod-csv-input').addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;
        this.value = '';

        const text = await file.text();
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) { showToast('File CSV kosong atau hanya berisi header!', 'warning'); return; }

        // Parse header
        const headerLine = lines[0];
        const headers = parseCSVLine(headerLine).map(h => h.trim().toLowerCase());

        // Validasi kolom wajib
        if (!headers.includes('nama')) {
            showToast('Kolom "nama" wajib ada di CSV!', 'error');
            return;
        }

        // Parse rows
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            const values = parseCSVLine(lines[i]);
            if (values.length === 0) continue;
            const row = {};
            headers.forEach((h, idx) => { row[h] = (values[idx] || '').trim(); });
            if (!row.nama) continue; // skip empty nama
            rows.push(row);
        }

        if (rows.length === 0) { showToast('Tidak ada data valid di CSV!', 'warning'); return; }

        // Konfirmasi
        const { isConfirmed } = await Swal.fire({
            title: 'Import Produk',
            html: `<p>Ditemukan <b>${rows.length}</b> produk dari file CSV.</p><p class="text-muted" style="font-size:0.8125rem;">ID akan digenerate otomatis oleh aplikasi.</p>`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: `Import ${rows.length} Produk`,
            cancelButtonText: 'Batal',
            confirmButtonColor: '#6366F1',
        });
        if (!isConfirmed) return;

        showLoading(`Mengimpor ${rows.length} produk...`);
        let successCount = 0;
        let failCount = 0;
        let newUnitCreated = false;

        for (const row of rows) {
            try {
                // Auto create category if it doesn't exist
                if (row.kategori) {
                    const catLower = row.kategori.trim().toLowerCase();
                    const catExists = categories.find(c => (c.nama_kategori||'').toLowerCase() === catLower);
                    if (!catExists) {
                        const newCatId = db.generateId('KAT_');
                        const catData = { id: newCatId, nama_kategori: row.kategori.trim() };
                        await db.optimisticWrite('insertRow', { tableName: 'Kategori_Produk', data: catData });
                        categories.push(catData); // Add locally to prevent duplicate creation
                    }
                }

                // Auto create unit if it doesn't exist
                if (row.satuan) {
                    const unitLower = row.satuan.trim().toLowerCase();
                    const unitExists = units.find(u => (u.nama||'').toLowerCase() === unitLower);
                    if (!unitExists) {
                        const newUnitId = db.generateId('SAT_');
                        const unitData = { id: newUnitId, nama: row.satuan.trim(), jumlah: '-' };
                        await db.optimisticWrite('insertRow', { tableName: 'Satuan_Produk', data: unitData });
                        units.push(unitData);
                        newUnitCreated = true;
                    }
                }

                const rowNama = (row.nama || '').trim();
                const existingProduct = allProducts.find(p => (p.nama || '').trim().toLowerCase() === rowNama.toLowerCase());

                if (existingProduct) {
                    // Update existing product with non-empty CSV fields
                    const newData = {};
                    if (row.kategori) newData.kategori = row.kategori.trim();
                    if (row.sku) newData.sku = row.sku.trim();
                    if (row.barcode) newData.barcode = row.barcode.trim();
                    if (row.satuan) newData.satuan = row.satuan.trim();
                    if (row.harga !== undefined && row.harga !== '') newData.harga = parseFloat(row.harga) || 0;
                    if (row.cost !== undefined && row.cost !== '') newData.cost = parseFloat(row.cost) || 0;
                    if (row.stok !== undefined && row.stok !== '') newData.stok = parseInt(row.stok) || 0;
                    if (row.stok_minimum !== undefined && row.stok_minimum !== '') newData.stok_minimum = parseInt(row.stok_minimum) || 5;
                    if (row.favorit !== undefined && row.favorit !== '') newData.favorit = (row.favorit === 'true' || row.favorit === '1') ? 'true' : 'false';
                    if (row.deskripsi) newData.deskripsi = row.deskripsi.trim();

                    if (Object.keys(newData).length > 0) {
                        newData.id = existingProduct.id;
                        await db.optimisticWrite('updateRow', { tableName: 'Produk', id: existingProduct.id, newData: newData });
                    }
                } else {
                    // Create new product
                    const nextId = db.generateId('PRD_');
                    const data = {
                        id: nextId,
                        nama: rowNama,
                        kategori: row.kategori || '',
                        sku: row.sku || '',
                        barcode: row.barcode || '',
                        satuan: row.satuan || 'Pcs',
                        harga: parseFloat(row.harga) || 0,
                        cost: parseFloat(row.cost) || 0,
                        stok: parseInt(row.stok) || 0,
                        stok_minimum: parseInt(row.stok_minimum) || 5,
                        favorit: (row.favorit === 'true' || row.favorit === '1') ? 'true' : 'false',
                        deskripsi: row.deskripsi || '',
                        foto_base64: '',
                    };
                    await db.optimisticWrite('insertRow', { tableName: 'Produk', data });
                    // Tambahkan ke allProducts agar row selanjutnya bisa mendeteksinya jika ada duplikat nama di CSV yang sama
                    allProducts.push(data);
                }
                
                successCount++;
            } catch(e) {
                failCount++;
                console.warn('Import gagal untuk:', row.nama, e.message);
            }
        }

        hideLoading();
        await loadAll();
        
        if (newUnitCreated) {
            Swal.fire({
                title: 'Import Selesai',
                html: `<p>Berhasil import ${successCount} produk.</p><p style="color:var(--warning); font-size:0.875rem; margin-top:0.5rem;">⚠️ Ditemukan Satuan Baru. Sistem telah membuatnya dengan nilai konversi kosong. <b>Harap buka tab Satuan untuk memperbarui nilainya!</b></p>`,
                icon: 'info',
                confirmButtonText: 'Tutup',
                confirmButtonColor: '#6366F1'
            });
        } else {
            let msg = `Berhasil import ${successCount} produk!`;
            if (failCount > 0) msg += ` (${failCount} gagal)`;
            showToast(msg, failCount > 0 ? 'warning' : 'success');
        }
    });

    // CSV line parser (handles quoted fields with commas)
    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (inQuotes) {
                if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
                else if (ch === '"') { inQuotes = false; }
                else { current += ch; }
            } else {
                if (ch === '"') { inQuotes = true; }
                else if (ch === ',') { result.push(current); current = ''; }
                else { current += ch; }
            }
        }
        result.push(current);
        return result;
    }

    // --- Unit Detail (mobile) ---
    window._unitDetail = function(id) {
        const u = units.find(x => x.id === id);
        if (!u) return;
        const qtyDisplay = (u.jumlah === '-' || !u.jumlah) ? '<span style="color:var(--danger);">Belum diset</span>' : u.jumlah;
        Swal.fire({
            title: '📐 ' + escapeHtml(u.nama),
            html: `<div style="text-align:left; font-size:0.875rem; line-height:2.2;">
                <div style="display:flex;justify-content:space-between;"><span class="text-muted">ID</span><code>${escapeHtml(u.id)}</code></div>
                <div style="display:flex;justify-content:space-between;"><span class="text-muted">Nama Satuan</span><b>${escapeHtml(u.nama)}</b></div>
                <div style="display:flex;justify-content:space-between;"><span class="text-muted">Jumlah/Konversi</span><span>${qtyDisplay}</span></div>
            </div>`,
            showCancelButton: true,
            confirmButtonText: '✏️ Edit',
            cancelButtonText: 'Tutup',
            confirmButtonColor: '#6366F1',
            width: 360
        }).then(r => { if (r.isConfirmed) window._unitEdit(id); });
    };

    // --- Cleanup ---
    window._viewCleanup = function() {
        window._prodEdit = null; window._prodDelete = null; window._prodDetail = null;
        window._catDelete = null; window._unitDelete = null; window._unitDetail = null;
    };

    // --- Init ---
    loadAll();
})();
</script>
