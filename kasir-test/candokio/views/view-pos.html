<!-- ============================================================================
     VIEW: KASIR (POS) — Terminal Point of Sale
     ============================================================================ -->

<style>
/* POS Layout: Split — Products kiri, Cart kanan */
.pos-layout { display: grid; grid-template-columns: 1fr 380px; gap: 1rem; height: calc(100vh - var(--header-h) - 3rem); }
.pos-products { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.pos-cart { display: flex; flex-direction: column; min-height: 0; overflow: hidden; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); }

/* Shift bar */
.shift-bar { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; background: var(--primary-light); border-radius: var(--radius-md); margin-bottom: 1rem; font-size: 0.8125rem; }
.shift-bar.inactive { background: var(--warning-light); }
.shift-bar .shift-status { font-weight: 600; color: var(--primary); }
.shift-bar.inactive .shift-status { color: var(--warning); }

/* Product grid */
.pos-search-bar { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
.pos-search-bar input { flex: 1; }
.pos-categories { display: flex; gap: 0.4rem; align-items: center; margin-bottom: 0.75rem; flex-wrap: nowrap; }
.pos-category-chip { padding: 0.3rem 0.7rem; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 500; background: var(--bg-surface); border: 1px solid var(--border-color); cursor: pointer; white-space: nowrap; transition: all var(--transition-fast); flex-shrink: 0; }
.pos-category-chip:hover { border-color: var(--primary); color: var(--primary); }
.pos-category-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Category Dropdown */
.pos-cat-dropdown-wrap { position: relative; flex-shrink: 0; }
.pos-cat-dropdown-btn { display: flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.7rem; border-radius: var(--radius-full); font-size: 0.75rem; font-weight: 500; background: var(--bg-surface); border: 1px solid var(--border-color); cursor: pointer; white-space: nowrap; transition: all var(--transition-fast); color: var(--text-main); }
.pos-cat-dropdown-btn:hover { border-color: var(--primary); color: var(--primary); }
.pos-cat-dropdown-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.pos-cat-dropdown-btn svg { transition: transform 0.2s; }
.pos-cat-dropdown-btn.open svg { transform: rotate(180deg); }
.pos-cat-dropdown-menu { display: none; position: absolute; top: calc(100% + 6px); left: 0; min-width: 160px; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-md); box-shadow: var(--shadow-md); z-index: 200; padding: 0.3rem 0; max-height: 260px; overflow-y: auto; }
.pos-cat-dropdown-menu.open { display: block; }
.pos-cat-dropdown-item { display: block; width: 100%; text-align: left; padding: 0.45rem 0.85rem; font-size: 0.8rem; font-weight: 500; background: none; border: none; cursor: pointer; color: var(--text-main); transition: background var(--transition-fast); white-space: nowrap; }
.pos-cat-dropdown-item:hover { background: var(--bg-surface-hover); color: var(--primary); }
.pos-cat-dropdown-item.active { color: var(--primary); font-weight: 700; background: var(--primary-light, rgba(99,102,241,0.08)); }
.pos-grid {flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.6rem; align-content: start; padding-right: 0.25rem; }
.pos-grid::-webkit-scrollbar { width: 4px; }
.pos-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

/* Product card */
.pos-product-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.6rem; cursor: pointer; transition: all var(--transition-fast); display: flex; flex-direction: column; }
.pos-product-card:hover { border-color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.pos-product-card:active { transform: scale(0.98); }
.pos-product-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius-sm); background: var(--bg-surface-alt); margin-bottom: 0.4rem; }
.pos-product-name { font-size: 0.8rem; font-weight: 500; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pos-product-price { font-size: 0.8rem; font-weight: 700; color: var(--primary); }
.pos-product-stock { font-size: 0.65rem; color: var(--text-muted); }
.pos-product-fav { color: var(--warning); font-size: 0.7rem; }

/* Cart panel */
.cart-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.cart-header h4 { margin: 0; font-size: 0.9375rem; }
.cart-items { flex: 1; overflow-y: auto; padding: 0.5rem; }
.cart-items::-webkit-scrollbar { width: 3px; }
.cart-items::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
.cart-empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8125rem; }
.cart-empty svg { width: 48px; height: 48px; opacity: 0.3; margin-bottom: 0.5rem; }

/* Cart item */
.cart-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem; border-bottom: 1px solid var(--border-light); }
.cart-item:last-child { border-bottom: none; }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-name { font-size: 0.8rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-price { font-size: 0.75rem; color: var(--text-muted); }
.cart-item-subtotal { font-size: 0.8rem; font-weight: 600; text-align: right; white-space: nowrap; min-width: 70px; }
.cart-qty-control { display: flex; align-items: center; gap: 0; }
.cart-qty-btn { width: 26px; height: 26px; border: 1px solid var(--border-color); background: var(--bg-surface-hover); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.875rem; font-weight: 600; color: var(--text-main); transition: all var(--transition-fast); padding: 0; }
.cart-qty-btn:hover { border-color: var(--primary); color: var(--primary); }
.cart-qty-input { width: 36px; height: 26px; text-align: center; border: 1px solid var(--border-color); border-left: none; border-right: none; background: var(--input-bg); font-size: 0.8rem; font-weight: 600; margin: 0; padding: 0; }
.cart-remove { background: none; border: none; color: var(--danger); cursor: pointer; padding: 0.2rem; opacity: 0.6; transition: opacity var(--transition-fast); }
.cart-remove:hover { opacity: 1; }

/* Cart footer / summary */
.cart-footer { border-top: 1px solid var(--border-color); padding: 0.75rem 1rem; flex-shrink: 0; }
.cart-summary-row { display: flex; justify-content: space-between; padding: 0.2rem 0; font-size: 0.8125rem; }
.cart-summary-row.total { font-size: 1rem; font-weight: 700; padding-top: 0.5rem; border-top: 1px solid var(--border-color); margin-top: 0.4rem; color: var(--primary); }
.cart-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
.cart-actions .btn { flex: 1; }

/* Customer selector */
.pos-customer { display: flex; gap: 0.5rem; align-items: center; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
.pos-customer input { flex: 1; margin: 0; }

/* List View */
.pos-grid.list-view { grid-template-columns: 1fr; gap:0; padding-right:0; border-top:1px solid var(--border-color); }
.pos-grid.list-view .pos-product-card { 
    flex-direction: row; align-items: center; justify-content:space-between; 
    padding: 0.75rem 0.5rem; border: none; border-bottom: 1px solid var(--border-light); 
    border-radius:0; box-shadow:none; gap: 0.8rem;
}
.pos-grid.list-view .pos-product-card:hover { transform:none; background:var(--bg-surface-hover); border-color:var(--border-light); box-shadow:none; }
.pos-grid.list-view .pos-product-img { width: 44px; height: 44px; margin-bottom: 0; flex-shrink:0; border-radius: var(--radius-sm); }
.pos-product-details { display:flex; flex-direction:column; flex:1; min-width:0; }
.pos-grid.list-view .pos-product-details { flex-direction:row; justify-content:space-between; align-items:center; gap:1rem; }
.pos-product-info { flex:1; min-width:0; }
.pos-grid.list-view .pos-product-name { margin-bottom:0.2rem; font-size:0.875rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pos-grid.list-view .pos-product-price { font-size:0.9rem; text-align:right; }

/* Desktop Cart Handle hidden */
.cart-mobile-handle { display: none; }

/* Responsive mobile: stack & floating cart */
@media (max-width: 768px) {
    .pos-layout { grid-template-columns: 1fr; height: calc(100vh - var(--header-h) - 3rem); display:block; position:relative; }
    .pos-products { max-height: none; height:100%; overflow-y:auto; padding-bottom: 75px; }
    .pos-cart { 
        position: fixed; bottom: var(--bottom-nav-h, 68px); left: 0; right: 0; z-index: 100;
        box-shadow: 0 -4px 15px rgba(0,0,0,0.1); 
        border-radius: 20px 20px 0 0; 
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateY(calc(100% - 60px));
        max-height: calc(100vh - var(--bottom-nav-h, 68px) - var(--header-h, 64px)); 
        background: var(--bg-surface);
    }
    .pos-cart.expanded { transform: translateY(0); }
    .pos-cart.expanded #cart-handle-icon { transform: rotate(180deg); }
    .cart-mobile-handle { 
        display: flex !important; align-items: center; justify-content: space-between; 
        padding: 0.75rem 1.25rem; background: var(--primary); color: #fff; 
        border-radius: 20px 20px 0 0; cursor: pointer; height:60px;
    }
    .cart-header { display:none; }
    .pos-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
}
</style>

<!-- Shift Status Bar -->
<div class="shift-bar inactive" id="shift-bar">
    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="shift-status" id="shift-status-text">Shift belum dibuka</span>
    <div style="margin-left:auto;">
        <button class="btn btn-primary btn-sm" id="btn-open-shift">Buka Shift</button>
        <button class="btn btn-danger btn-sm hidden" id="btn-close-shift">Tutup Shift</button>
    </div>
</div>

<!-- POS Layout -->
<div class="pos-layout">
    <!-- LEFT: Products Panel -->
    <div class="pos-products">
        <div class="pos-search-bar">
            <input type="search" id="pos-search" placeholder="Cari produk (nama/SKU/barcode)..." style="min-width:0;">
            <button class="btn btn-outline" id="btn-scan-barcode" title="Scan Barcode">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="7" y2="16"/><line x1="11" y1="8" x2="11" y2="16"/><line x1="15" y1="8" x2="15" y2="12"/><line x1="19" y1="8" x2="19" y2="16"/></svg>
            </button>
            <button class="btn btn-outline" id="btn-view-toggle" title="Ubah Tampilan" style="padding:0.4rem;">
                <svg id="icon-grid" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" style="display:none;"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                <svg id="icon-list" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </button>
        </div>
        <div class="pos-categories" id="pos-categories">
            <span class="pos-category-chip active" data-cat="all">Semua</span>
            <span class="pos-category-chip" data-cat="fav">⭐ Favorit</span>
            <!-- Dropdown kategori tambahan (diisi oleh renderCategories di pos.js) -->
            <div class="pos-cat-dropdown-wrap" id="pos-cat-dropdown-wrap" style="display:none;">
                <button class="pos-cat-dropdown-btn" id="pos-cat-dropdown-btn" type="button">
                    <span id="pos-cat-dropdown-label">Kategori</span>
                    <svg viewBox="0 0 24 24" width="12" height="12" stroke="currentColor" fill="none" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="pos-cat-dropdown-menu" id="pos-cat-dropdown-menu"></div>
            </div>
        </div>
        <div class="pos-grid" id="pos-grid">
            <div class="empty-state" style="grid-column:1/-1; padding:2rem;">
                <div class="spinner" style="margin:0 auto 0.5rem;"></div>
                <p>Memuat produk...</p>
            </div>
        </div>
    </div>

    <!-- RIGHT: Cart Panel -->
    <div class="pos-cart" id="pos-cart-panel">
        <div class="cart-mobile-handle" id="pos-cart-handle">
            <div style="display:flex; align-items:center; gap:0.5rem; font-weight:600;">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                <span id="mobile-cart-count">0 Item</span>
            </div>
            <div style="display:flex; align-items:center; gap:0.5rem;">
                <span id="mobile-cart-total" style="font-weight:700; font-size:1.1rem;">Rp 0</span>
                <svg id="cart-handle-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" style="transition:transform 0.3s;"><polyline points="18 15 12 9 6 15"/></svg>
            </div>
        </div>
        <div class="cart-header">
            <h4>🛒 Keranjang <span class="badge badge-primary" id="cart-count">0</span></h4>
            <button class="btn btn-ghost btn-sm" id="btn-clear-cart" title="Kosongkan Keranjang">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                Hapus
            </button>
        </div>
        <!-- Customer -->
        <div class="pos-customer">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="pos-customer-input" placeholder="Pelanggan (opsional)" list="customer-list" style="margin:0;">
            <datalist id="customer-list"></datalist>
        </div>
        <!-- Cart Items -->
        <div class="cart-items" id="cart-items">
            <div class="cart-empty">
                <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <p>Keranjang masih kosong.<br>Pilih produk untuk memulai.</p>
            </div>
        </div>
        <!-- Cart Footer -->
        <div class="cart-footer">
            <div class="cart-summary-row">
                <span>Subtotal</span>
                <span id="cart-subtotal">Rp 0</span>
            </div>
            <div class="cart-summary-row">
                <span>Diskon <button class="btn btn-ghost btn-sm" id="btn-set-discount" style="padding:0 0.25rem; font-size:0.7rem;">(Atur)</button></span>
                <span id="cart-discount">- Rp 0</span>
            </div>
            <div class="cart-summary-row total">
                <span>TOTAL</span>
                <span id="cart-total">Rp 0</span>
            </div>
            <div class="cart-actions">
                <button class="btn btn-primary btn-lg" id="btn-checkout" disabled>
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/></svg>
                    Bayar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Barcode Scanner Modal -->
<div class="modal-overlay" id="scanner-modal">
    <div class="modal-content" style="max-width:400px;">
        <div class="modal-header">
            <h3>📷 Scan Barcode</h3>
            <button class="modal-close" id="btn-close-scanner"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body">
            <div id="scanner-view" style="width:100%;"></div>
            <p class="text-sm text-muted mt-1 text-center">Arahkan kamera ke barcode/QR code produk</p>
        </div>
    </div>
</div>

<script src="js/pos.js"></script>
