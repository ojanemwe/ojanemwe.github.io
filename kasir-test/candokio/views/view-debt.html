<!-- ============================================================================
     VIEW: HUTANG — Piutang & Cicilan
     ============================================================================ -->
<div class="page-header">
    <h2>Manajemen Hutang</h2>
    <button class="btn btn-outline btn-sm" id="debt-btn-export">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        CSV
    </button>
</div>

<div class="filter-bar">
    <input type="search" id="debt-search" placeholder="Cari nama pelanggan..." style="flex:1;">
    <select id="debt-filter" style="min-width:140px;">
        <option value="">Semua Status</option>
        <option value="Belum Lunas">🔴 Belum Lunas</option>
        <option value="Lunas">🟢 Lunas</option>
    </select>
    <select id="debt-sort-order" style="min-width:130px;">
        <option value="desc">Terbaru</option>
        <option value="asc">Terlama</option>
    </select>
</div>

<div class="card">
    <div class="table-container table-desktop">
        <table>
            <thead><tr><th>ID</th><th>Pelanggan</th><th>ID Transaksi</th><th style="text-align:right;">Total</th><th style="text-align:right;">Sudah Bayar</th><th style="text-align:right;">Sisa</th><th>Status</th><th>Jatuh Tempo</th><th style="width:80px;">Aksi</th></tr></thead>
            <tbody id="debt-table"></tbody>
        </table>
    </div>
    <div id="debt-mobile"></div>
    <!-- Pagination -->
    <div style="display:flex; justify-content:space-between; align-items:center; padding:0.75rem 1rem; border-top:1px solid var(--border-color); font-size:0.8125rem;">
            <span id="debt-page-info" class="text-muted"><span class="desktop-only">Halaman </span>1 dari 1</span>
        <div class="btn-group">
            <button class="btn btn-outline btn-sm" id="debt-prev">« Prev</button>
            <button class="btn btn-outline btn-sm" id="debt-next">Next »</button>
        </div>
    </div>
</div>

<!-- Modal Detail Hutang + Riwayat Cicilan -->
<div class="modal-overlay" id="debt-detail-modal">
    <div class="modal-content" style="max-width:500px;">
        <div class="modal-header">
            <h3>Detail Hutang</h3>
            <button class="modal-close" onclick="document.getElementById('debt-detail-modal').classList.remove('active')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div class="modal-body" id="debt-detail-content"></div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="debt-pay-btn">💰 Bayar Cicilan</button>
        </div>
    </div>
</div>

<script>
(function(){
    let debts=[], payments=[], currentDebtId='';
    let currentPage = 1;
    let perPage = parseInt(localStorage.getItem('candokio_per_page')) || 50;

    async function load(){
        try{
            const data=await OfflineService.cachedBulkRead(['Hutang','PembayaranHutang']);
            debts=data.Hutang||[]; payments=data.PembayaranHutang||[];
        }catch(e){debts=[];payments=[];}
        currentPage = 1;
        render();
    }

    function render(){
        let filtered=[...debts];
        const q=(document.getElementById('debt-search').value||'').toLowerCase();
        const f=document.getElementById('debt-filter').value;
        if(q) filtered=filtered.filter(d=>(d.nama_pelanggan||'').toLowerCase().includes(q));
        if(f) filtered=filtered.filter(d=>d.status===f);

        // Sort by jatuh tempo
        const sortOrder = document.getElementById('debt-sort-order').value;
        filtered.sort((a,b) => {
            const tA = (a.tanggal_jatuh_tempo||a.id||'').toString();
            const tB = (b.tanggal_jatuh_tempo||b.id||'').toString();
            return sortOrder === 'desc' ? tB.localeCompare(tA) : tA.localeCompare(tB);
        });

        // Pagination
        const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
        if (currentPage > totalPages) currentPage = totalPages;
        const startIdx = (currentPage - 1) * perPage;
        const paged = filtered.slice(startIdx, startIdx + perPage);
        document.getElementById('debt-page-info').innerHTML = `<span class="desktop-only">Halaman </span>${currentPage} dari ${totalPages} (${filtered.length} data)`;
        document.getElementById('debt-prev').disabled = currentPage <= 1;
        document.getElementById('debt-next').disabled = currentPage >= totalPages;

        document.getElementById('debt-table').innerHTML=paged.length===0
            ?'<tr><td colspan="9" class="text-center text-muted" style="padding:2rem;">Tidak ada data hutang</td></tr>'
            :paged.map(d=>{
                const badge=d.status==='Lunas'?'<span class="badge badge-success">Lunas</span>':'<span class="badge badge-danger">Belum Lunas</span>';
                return `<tr onclick="window._debtDetail('${d.id}')" style="cursor:pointer;">
                    <td><code class="text-xs">${escapeHtml(d.id)}</code></td>
                    <td><strong>${escapeHtml(d.nama_pelanggan)}</strong></td>
                    <td><code class="text-xs">${escapeHtml(d.id_transaksi)}</code></td>
                    <td style="text-align:right;">${formatCurrency(d.total)}</td>
                    <td style="text-align:right;">${formatCurrency(d.sudah_bayar)}</td>
                    <td style="text-align:right;font-weight:600;">${formatCurrency(d.sisa)}</td>
                    <td>${badge}</td>
                    <td>${d.tanggal_jatuh_tempo?formatDate(d.tanggal_jatuh_tempo):'-'}</td>
                    <td><button class="btn btn-primary btn-sm" onclick="event.stopPropagation();window._debtPay('${d.id}')" ${d.status==='Lunas'?'disabled':''}>Bayar</button></td>
                </tr>`;
            }).join('');

        document.getElementById('debt-mobile').innerHTML=paged.map(d=>{
            const badge=d.status==='Lunas'?'<span class="badge badge-success">Lunas</span>':'<span class="badge badge-danger">Belum</span>';
            return `<div class="table-mobile-row" onclick="window._debtDetail('${d.id}')">
                <div style="flex:1;min-width:0;">
                    <div class="mobile-row-main truncate">${escapeHtml(d.nama_pelanggan)}</div>
                    <div class="mobile-row-sub">${formatCurrency(d.total)}</div>
                </div>
                <div class="mobile-row-badge">${badge}</div>
            </div>`;
        }).join('');
    }

    document.getElementById('debt-prev').addEventListener('click', () => { if(currentPage>1){currentPage--;render();} });
    document.getElementById('debt-next').addEventListener('click', () => { currentPage++;render(); });
    document.getElementById('debt-search').addEventListener('input', () => { currentPage=1; render(); });
    document.getElementById('debt-filter').addEventListener('change', () => { currentPage=1; render(); });
    document.getElementById('debt-sort-order').addEventListener('change', () => { currentPage=1; render(); });

    window._debtDetail = function(id){
        const d=debts.find(x=>x.id===id); if(!d) return;
        currentDebtId=id;
        const badge=d.status==='Lunas'?'<span class="badge badge-success">Lunas</span>':'<span class="badge badge-danger">Belum Lunas</span>';
        const related=payments.filter(p=>p.id_hutang===id);
        const historyHtml=related.length===0?'<p class="text-muted text-sm">Belum ada pembayaran</p>'
            :'<table style="width:100%;font-size:0.8rem;"><thead><tr><th>Tanggal</th><th>Jumlah</th><th>Metode</th></tr></thead><tbody>'
            +related.map(p=>`<tr><td>${formatDate(p.tanggal)}</td><td>${formatCurrency(p.jumlah)}</td><td>${escapeHtml(p.metode||'Tunai')}</td></tr>`).join('')
            +'</tbody></table>';

        document.getElementById('debt-detail-content').innerHTML=`
            <div style="line-height:2; font-size:0.875rem;">
                <div class="flex justify-between"><span class="text-muted">Pelanggan</span><b>${escapeHtml(d.nama_pelanggan)}</b></div>
                <div class="flex justify-between"><span class="text-muted">Transaksi</span><code>${escapeHtml(d.id_transaksi)}</code></div>
                <div class="flex justify-between"><span class="text-muted">Total</span><span>${formatCurrency(d.total)}</span></div>
                <div class="flex justify-between"><span class="text-muted">Sudah Bayar</span><span>${formatCurrency(d.sudah_bayar)}</span></div>
                <div class="flex justify-between"><span class="text-muted">Sisa</span><b style="color:var(--danger);">${formatCurrency(d.sisa)}</b></div>
                <div class="flex justify-between"><span class="text-muted">Status</span>${badge}</div>
                <div class="flex justify-between"><span class="text-muted">Jatuh Tempo</span><span>${d.tanggal_jatuh_tempo?formatDate(d.tanggal_jatuh_tempo):'-'}</span></div>
            </div>
            <hr><h4 style="margin-bottom:0.5rem;">Riwayat Pembayaran</h4>${historyHtml}`;
        document.getElementById('debt-pay-btn').disabled=(d.status==='Lunas');
        document.getElementById('debt-detail-modal').classList.add('active');
    };

    window._debtPay = async function(id){
        currentDebtId=id;
        const d=debts.find(x=>x.id===id); if(!d||d.status==='Lunas') return;
        const {value:formValues}=await Swal.fire({
            title:'Bayar Cicilan',
            html:`<p style="margin-bottom:0.5rem;">Sisa hutang: <b style="color:var(--danger);">${formatCurrency(d.sisa)}</b></p>
                <input id="swal-pay-amount" class="swal2-input" type="number" min="1" max="${d.sisa}" placeholder="Jumlah bayar" style="width:100%;">
                <select id="swal-pay-method" class="swal2-input" style="width:100%;"><option value="Tunai">Tunai</option><option value="Transfer">Transfer</option><option value="QRIS">QRIS</option></select>
                <input id="swal-pay-note" class="swal2-input" placeholder="Keterangan (opsional)" style="width:100%;">`,
            showCancelButton:true,confirmButtonText:'Bayar',confirmButtonColor:'#10B981',
            preConfirm:()=>({jumlah:parseFloat(document.getElementById('swal-pay-amount').value),metode:document.getElementById('swal-pay-method').value,keterangan:document.getElementById('swal-pay-note').value}),
        });
        if(formValues&&formValues.jumlah>0){
            showLoading('Memproses pembayaran...');
            try{
                await db.optimisticWrite('payDebt',{hutangId:id,jumlah:formValues.jumlah,metode:formValues.metode,keterangan:formValues.keterangan,bukti_base64:'',shiftId:''});
                showToast('Pembayaran berhasil!','success');
                document.getElementById('debt-detail-modal').classList.remove('active');
                await load();
            }catch(e){showToast(e.message,'error');}
            hideLoading();
        }
    };

    document.getElementById('debt-pay-btn').addEventListener('click',()=>window._debtPay(currentDebtId));
    document.getElementById('debt-btn-export').addEventListener('click',()=>exportCSV(debts,'Hutang_Candokio',['id','id_transaksi','nama_pelanggan','total','sudah_bayar','sisa','status','tanggal_jatuh_tempo']));

    window._viewCleanup=()=>{window._debtDetail=null;window._debtPay=null;};
    load();
})();
</script>
