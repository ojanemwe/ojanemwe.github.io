<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoPas - IDE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Dracula Theme Colors - Better for reading code */
            --bg-primary: #282a36;
            --bg-secondary: #21222c;
            --bg-tertiary: #44475a;
            --bg-hover: #3a3c4a;
            --bg-active: #6272a4;
            --text-primary: #f8f8f2;
            --text-secondary: #bd93f9;
            --accent: #bd93f9;
            --accent-hover: #ff79c6;
            --border: #44475a;
            --sidebar-width: 250px;
            --sidebar-width-collapsed: 50px;
            --header-height: 40px;
            --statusbar-height: 22px;

            /* Better code text colors */
            --code-text: #f8f8f2;
            --code-keyword: #ff79c6;
            --code-string: #f1fa8c;
            --code-number: #bd93f9;
            --code-comment: #6272a4;
            --code-function: #50fa7b;
            --code-tag: #ff79c6;
            --code-attribute: #8be9fd;
            --code-property: #ffb86c;
            --code-html-tag: #ff79c6;
            --code-html-attribute: #50fa7b;
            --code-html-value: #f1fa8c;
            --code-css-property: #66d9ef;
            --code-css-value: #f1fa8c;
            --code-css-selector: #ff79c6;
            --code-js-keyword: #ff79c6;
            --code-js-string: #f1fa8c;
            --code-js-function: #50fa7b;
            --code-js-comment: #6272a4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header (compact: half-height) */
        .header {
            height: auto;
            min-height: 24px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            padding: 0 8px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .header-title {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-primary);
            margin-right: 14px;
        }

        /* Main Tabs in Header */
        .header-tabs {
            display: flex;
            gap: 2px;
            margin-right: 14px;
        }

        .header-tab {
            padding: 4px 10px;
            font-size: 11px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            position: relative;
            top: 1px;
        }

        .header-tab:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .header-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--bg-primary);
        }

        /* Preview Toolbar (Responsive) - Only visible when Preview tab active */
        .preview-toolbar {
            display: none;
            align-items: center;
            gap: 6px;
            margin-left: 14px;
        }

        .preview-toolbar.visible {
            display: flex;
        }

        .preview-toolbar label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .device-select {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
        }

        .device-select:focus {
            border-color: var(--accent);
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 6px;
        }

        .header-btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 3px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.2s;
            line-height: 1.3;
        }

        .header-btn:hover {
            background: var(--accent-hover);
        }

        .header-btn.secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .header-btn.secondary:hover {
            background: var(--bg-hover);
        }

        /* Main Container */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease;
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: var(--sidebar-width-collapsed);
        }

        .sidebar-header {
            padding: 12px 10px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar.collapsed .sidebar-header span {
            display: none;
        }

        .sidebar.collapsed .add-project-btn {
            display: none;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            transition: color 0.2s;
        }

        .sidebar-toggle:hover {
            color: var(--accent);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
        }

        .file-list::-webkit-scrollbar {
            width: 8px;
        }

        .file-list::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .file-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .file-item {
            padding: 7px 10px 7px 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .file-item:hover {
            background: var(--bg-hover);
        }

        .file-item.active {
            background: var(--bg-active);
            border-left-color: var(--accent);
        }

        .sidebar.collapsed .file-item span {
            display: none;
        }

        /* Project folder row */
        .project-folder {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            border-left: 3px solid transparent;
            transition: background 0.2s;
            user-select: none;
        }
        .project-folder:hover { background: var(--bg-hover); }
        .project-folder.active-project { border-left-color: var(--accent); background: var(--bg-hover); }
        .project-folder .folder-toggle { font-size: 10px; color: var(--text-secondary); flex-shrink: 0; }
        .project-folder .folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-folder .proj-actions { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
        .project-folder .proj-actions span {
            opacity: 0.55; font-size: 13px; cursor: pointer; transition: opacity 0.2s;
        }
        .project-folder .proj-actions span:hover { opacity: 1; }

        /* Files inside project */
        .project-files { overflow: hidden; transition: max-height 0.2s ease; }
        .project-files.collapsed { max-height: 0 !important; }

        /* Add-project icon button */
        .add-project-btn {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 15px; padding: 2px 4px;
            transition: color 0.2s; line-height: 1;
        }
        .add-project-btn:hover { color: var(--accent); }

        .file-icon {
            font-size: 16px;
            min-width: 16px;
        }

        .file-item .file-icon.html { color: var(--code-tag); }
        .file-item .file-icon.css { color: var(--code-attribute); }
        .file-item .file-icon.js { color: var(--code-string); }
        .file-item .file-icon.json { color: var(--code-number); }
        .file-item .file-icon.svg { color: var(--code-property); }
        .file-item .file-icon.image { color: var(--code-keyword); }
        .file-item .file-icon.env { color: var(--code-comment); }
        .file-item .file-icon.folder { color: var(--code-property); }

        /* Find & Replace panel (VSCode-like) */
        .find-replace-panel {
            position: absolute;
            top: 6px;
            right: 18px;
            z-index: 60;
            background: var(--bg-tertiary, #282a36);
            border: 1px solid var(--border, #44475a);
            border-radius: 5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 340px;
            font-size: 12px;
            color: var(--text-primary, #f8f8f2);
        }
        .find-replace-panel.active { display: flex; }
        .find-replace-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .find-replace-row input[type="text"] {
            flex: 1;
            background: var(--bg-primary, #1e1f29);
            border: 1px solid transparent;
            color: var(--text-primary, #f8f8f2);
            padding: 4px 6px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 12px;
            outline: none;
            min-width: 0;
        }
        .find-replace-row input[type="text"]:focus {
            border-color: var(--accent, #bd93f9);
        }
        .find-replace-row input.no-match {
            border-color: #ff5555;
        }
        .find-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary, #6272a4);
            cursor: pointer;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 12px;
            line-height: 1;
            min-width: 24px;
        }
        .find-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary, #f8f8f2);
        }
        .find-btn.toggle.active {
            background: rgba(189, 147, 249, 0.25);
            color: var(--accent, #bd93f9);
        }
        .find-count {
            font-size: 11px;
            color: var(--text-secondary, #6272a4);
            min-width: 70px;
            text-align: center;
            white-space: nowrap;
        }
        .find-count.no-match { color: #ff5555; }

        /* Highlight overlay marks for find matches */
        .code-highlight mark.find-match {
            background: rgba(241, 250, 140, 0.35);
            color: inherit;
            border-radius: 2px;
            padding: 0;
        }
        .code-highlight mark.find-match.current {
            background: rgba(255, 184, 108, 0.6);
            outline: 1px solid #ffb86c;
        }

        /* Asset preview area for binary files */
        .asset-preview {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary, #1e1f29);
            color: var(--text-secondary, #6272a4);
            padding: 20px;
            text-align: center;
            gap: 10px;
            overflow: auto;
            z-index: 5;
        }
        .asset-preview.active { display: flex; }
        .asset-preview img {
            max-width: 90%;
            max-height: 60vh;
            border: 1px solid var(--border, #44475a);
            border-radius: 4px;
            background:
                linear-gradient(45deg, #2a2c38 25%, transparent 25%),
                linear-gradient(-45deg, #2a2c38 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #2a2c38 75%),
                linear-gradient(-45deg, transparent 75%, #2a2c38 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        }
        .asset-preview .asset-name {
            font-weight: 600;
            color: var(--text-primary, #f8f8f2);
            font-size: 13px;
        }
        .asset-preview .asset-meta {
            font-size: 11px;
            opacity: 0.8;
        }

        /* File action buttons (rename, delete) */
        .file-item div[style*="margin-left: auto"] span:hover {
            opacity: 1 !important;
            transform: scale(1.2);
            transition: all 0.2s;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Editor Panel */
        .editor-panel {
            flex: 1;
            display: none;
            overflow: hidden;
        }

        .editor-panel.active {
            display: flex;
            flex-direction: column;
        }

        /* Welcome Panel */
        .welcome-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            text-align: center;
            padding: 40px;
        }

        .welcome-panel h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: var(--accent);
            font-weight: 600;
        }

        .welcome-panel p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 16px;
        }

        .welcome-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .welcome-btn {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 14px 28px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .welcome-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(189, 147, 249, 0.3);
        }

        .welcome-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .welcome-btn.secondary:hover {
            background: var(--bg-hover);
        }

        /* Editor Tabs (HTML, CSS, JS) - HIDDEN */
        .editor-tabs-container {
            display: none; /* Hide the tab buttons */
        }

        .editor-tab {
            padding: 10px 20px;
            font-size: 13px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-tab:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .editor-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--bg-primary);
        }

        /* Editor Container */
        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-wrapper.hidden {
            display: none;
        }

        .editor-wrapper.active {
            flex: 1;
        }

        /* Code Area with Syntax Highlighting - FIXED VERSION */
        .editor-with-lines {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg-primary);
        }

        .line-numbers {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 15px 12px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            text-align: right;
            user-select: none;
            border-right: 1px solid var(--border);
            min-width: 50px;
            flex-shrink: 0;
            overflow: hidden;
            box-sizing: border-box;
        }

        .code-editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
        }

        /* Both highlight and textarea use same container.
           CRITICAL: every property that affects glyph layout / wrapping
           MUST be identical on .code-highlight and .code-area, otherwise
           syntax highlighting drifts away from the typed text. */
        .code-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: 0;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            font-variant-ligatures: none;
            letter-spacing: 0;
            tab-size: 4;
            -moz-tab-size: 4;
            border: 0;
            /* CRITICAL: force the SAME scrollbar reservation on every layer
               so the available content width is identical. If only the
               textarea shows a vertical scrollbar, its content box becomes
               narrower than the highlight/measure layers and wrap points
               drift, which throws off line numbers and cursor alignment. */
            overflow-y: scroll;
            overflow-x: auto;
            scrollbar-gutter: stable;
            white-space: pre;
            word-spacing: 0;
            box-sizing: border-box;
            background: transparent;
        }

        .code-measure {
            pointer-events: none;
            z-index: 0;
            visibility: hidden;
            color: transparent;
        }

        /* Hide visible scrollbars on the non-interactive layers but keep
           the gutter reserved (handled by scrollbar-gutter on .code-layer)
           so their content width matches the textarea exactly. */
        .code-highlight::-webkit-scrollbar,
        .code-measure::-webkit-scrollbar { width: 0; height: 0; }
        .code-highlight { scrollbar-width: none; }
        .code-measure { scrollbar-width: none; }

        .code-measure .ml {
            display: block;
            margin: 0;
            padding: 0;
            border: 0;
            text-indent: 0;
            min-height: 1.6em;
        }

        .code-highlight {
            pointer-events: none;
            z-index: 1;
            color: var(--code-text);
            display: block;
        }

        /* Per-source-line wrapper inside the highlight layer.
           Always block-level so we can measure each line's height for
           the gutter, even when wrap is disabled. NO padding / indent /
           margin here — those would shift glyph positions away from the
           textarea and break highlight alignment. */
        .code-highlight .cl {
            display: block;
            margin: 0;
            padding: 0;
            border: 0;
            text-indent: 0;
            min-height: 1.6em;
        }

        .code-area {
            color: transparent;
            caret-color: var(--accent);
            background: transparent;
            resize: none;
            outline: none;
            z-index: 2;
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Word Wrap mode — applied to BOTH layers identically so wrap
           positions match exactly. */
        .code-layer.word-wrap {
            white-space: pre-wrap;
            word-break: normal;
            overflow-wrap: break-word;
            overflow-x: hidden;
        }
        .code-highlight.word-wrap .cl {
            white-space: pre-wrap;
            word-break: normal;
            overflow-wrap: break-word;
        }
        .code-measure.word-wrap .ml {
            white-space: pre-wrap;
            word-break: normal;
            overflow-wrap: break-word;
        }

        /* Line numbers wrap support */
        .line-numbers .ln {
            display: block;
            box-sizing: border-box;
        }

        /* Syntax Highlighting Classes */
        .token-html-tag { color: var(--code-html-tag); }
        .token-html-attribute { color: var(--code-html-attribute); }
        .token-html-value { color: var(--code-html-value); }
        .token-html-comment { color: var(--code-comment); }
        .token-css-selector { color: var(--code-css-selector); }
        .token-css-property { color: var(--code-css-property); }
        .token-css-value { color: var(--code-css-value); }
        .token-css-comment { color: var(--code-comment); }
        .token-js-keyword { color: var(--code-js-keyword); }
        .token-js-string { color: var(--code-js-string); }
        .token-js-function { color: var(--code-js-function); }
        .token-js-comment { color: var(--code-js-comment); }
        .token-js-number { color: var(--code-number); }

        /* Preview Panel */
        .preview-panel {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
            min-height: 0; /* Important for flex child overflow */
        }

        .preview-panel.active {
            display: flex;
        }

        /* Autocomplete Dropdown */
        .autocomplete-dropdown {
            position: absolute;
            display: none;
            background: #1e1f29;
            border: 1px solid #44475a;
            border-radius: 6px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
            max-height: 260px;
            overflow-y: auto;
            z-index: 999999;
            min-width: 300px;
            max-width: 460px;
        }

        .autocomplete-dropdown.active {
            display: block;
        }

        .autocomplete-item {
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12.5px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            border-bottom: 1px solid rgba(68,71,90,0.25);
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 0;
            white-space: nowrap;
            overflow: hidden;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background: #44475a;
        }

        .autocomplete-item abbr {
            color: var(--accent);
            font-weight: bold;
        }

        .autocomplete-item .preview {
            color: #6272a4;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .autocomplete-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .autocomplete-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }

        .autocomplete-dropdown::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Preview Container - Desktop: tanpa padding */
        .preview-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1b26;
            padding: 20px;
            overflow: auto;
        }

        .preview-container.mode-desktop {
            padding: 0;
            overflow: hidden;
        }

        .preview-container.mode-mobile-tablet {
            overflow: hidden;
        }

        .preview-frame {
            background: white;
            border: none;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: width 0.3s, height 0.3s;
        }

        /* Device Frame Styles */
        .preview-frame.device-mobile {
            width: 375px;
            height: 667px;
        }

        .preview-frame.device-tablet {
            width: 768px;
            height: 1024px;
        }

        /* Preview wrapper for mobile and tablet scaling */
        .preview-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center center;
            transition: transform 0.3s ease;
        }

        /* Mobile & Tablet: wrapper dengan overflow scroll */
        .preview-wrapper.mode-mobile-tablet {
            overflow: auto;
        }

        /* Custom scrollbar for mobile & tablet wrapper */
        .preview-wrapper.mode-mobile-tablet::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        // ===== File-type helpers =====
        // Map file extension -> internal type.
        // Editable types: html, css, js, json, svg, env, text
        // Binary asset types: image (png/webp). Stored as data URL in `content`.
        function getFileTypeFromName(filename) {
            const name = (filename || '').toLowerCase();
            const ext = name.includes('.') ? name.split('.').pop() : '';
            switch (ext) {
                case 'html': case 'htm': return 'html';
                case 'css': return 'css';
                case 'js': case 'mjs': case 'cjs': return 'js';
                case 'json': return 'json';
                case 'svg': return 'svg';
                case 'png': case 'webp': case 'jpg': case 'jpeg': case 'gif': return 'image';
                case 'env': return 'env';
                default:
                    if (name === '.env' || name.startsWith('.env.')) return 'env';
                    return 'text';
            }
        }
        // Editor-tab type used to host editable text (html/css/js editors).
        // Asset types map to a generic editor; binary maps to preview only.
        function getEditorTabForType(type) {
            if (type === 'css') return 'css';
            if (type === 'js' || type === 'json') return 'js';
            // html, svg, env, text -> html editor (plain text-ish)
            return 'html';
        }
        function isBinaryType(type) { return type === 'image'; }
        function isEditableType(type) { return !isBinaryType(type); }

        // MIME type for preview (used for blob/data url fallback)
        function getMimeForFile(filename, type) {
            const ext = (filename || '').toLowerCase().split('.').pop();
            if (type === 'image') {
                if (ext === 'png') return 'image/png';
                if (ext === 'webp') return 'image/webp';
                if (ext === 'jpg' || ext === 'jpeg') return 'image/jpeg';
                if (ext === 'gif') return 'image/gif';
                return 'application/octet-stream';
            }
            if (type === 'svg' || ext === 'svg') return 'image/svg+xml';
            if (type === 'json' || ext === 'json') return 'application/json';
            if (type === 'css') return 'text/css';
            if (type === 'js') return 'application/javascript';
            if (type === 'html') return 'text/html';
            return 'text/plain';
        }

        // Syntax Highlighting Functions
        function highlightHTML(code) {
            let escaped = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            escaped = escaped.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="token-html-comment">$1</span>');
            escaped = escaped.replace(/(&lt;!DOCTYPE[^&gt;]*&gt;)/gi, '<span class="token-html-tag">$1</span>');

            escaped = escaped.replace(/(&lt;)([\w-]+)((?:\s+[\w-]+(?:\s*=\s*(?:"[^"]*"|\'[^\']*\'))?)*)?(&gt;)/g, function(match, lt, tagName, attributes, gt) {
                let result = lt + '<span class="token-html-tag">' + tagName + '</span>';
                if (attributes) {
                    result += attributes.replace(/\s+([\w-]+)(\s*=\s*(?:"([^"]*)"|'([^\']*)'))?/g, function(attrMatch, attrName, equals, doubleQuoteValue, singleQuoteValue) {
                        if (equals) {
                            const value = doubleQuoteValue !== undefined ? doubleQuoteValue : (singleQuoteValue !== undefined ? singleQuoteValue : '');
                            const quote = doubleQuoteValue !== undefined ? '"' : "'";
                            return ' <span class="token-html-attribute">' + attrName + '</span>=' + quote + '<span class="token-html-value">' + value + '</span>' + quote;
                        } else {
                            return ' <span class="token-html-attribute">' + attrName + '</span>';
                        }
                    });
                }
                return result + gt;
            });

            escaped = escaped.replace(/(&lt;\/)([\w-]+)(&gt;)/g, '$1<span class="token-html-tag">$2</span>$3');
            return escaped;
        }

        function highlightCSS(code) {
            const esc = (s) => s
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            let out = '';
            let i = 0;
            const n = code.length;
            let state = 'selector';

            const numUnitRe = /^(\d+\.?\d*)(px|em|rem|%|vh|vw|deg|s|ms|fr|ch|ex)?\b/;
            const hexRe = /^#[a-fA-F0-9]{3,8}\b/;
            const fnColorRe = /^(rgb|hsl)a?\([^)]*\)/i;
            const identRe = /^[\w-]+/;

            const wrap = (cls, text) => `<span class="${cls}">${esc(text)}</span>`;

            while (i < n) {
                const ch = code[i];

                if (ch === '/' && code[i + 1] === '*') {
                    const end = code.indexOf('*/', i + 2);
                    const stop = end === -1 ? n : end + 2;
                    out += wrap('token-css-comment', code.slice(i, stop));
                    i = stop;
                    continue;
                }

                if (/\s/.test(ch)) {
                    out += ch;
                    i++;
                    continue;
                }

                if (state === 'selector') {
                    if (ch === '{') {
                        out += '{';
                        i++;
                        state = 'block';
                        continue;
                    }
                    if (ch === '}') {
                        out += '}';
                        i++;
                        continue;
                    }
                    let j = i;
                    while (j < n && !/[\s{}]/.test(code[j]) && !(code[j] === '/' && code[j + 1] === '*')) {
                        j++;
                    }
                    out += wrap('token-css-selector', code.slice(i, j));
                    i = j;
                    continue;
                }

                if (state === 'block') {
                    if (ch === '}') {
                        out += '}';
                        i++;
                        state = 'selector';
                        continue;
                    }
                    if (ch === ';') {
                        out += ';';
                        i++;
                        continue;
                    }
                    if (ch === ':') {
                        out += ':';
                        i++;
                        state = 'value';
                        continue;
                    }
                    const m = code.slice(i).match(identRe);
                    if (m) {
                        out += wrap('token-css-property', m[0]);
                        i += m[0].length;
                        continue;
                    }
                    out += esc(ch);
                    i++;
                    continue;

                if (state === 'value') {
                    if (ch === ';') {
                        out += ';';
                        i++;
                        state = 'block';
                        continue;
                    }
                    if (ch === '}') {
                        out += '}';
                        i++;
                        state = 'selector';
                        continue;
                    }
                    let m = code.slice(i).match(hexRe);
                    if (m) {
                        out += wrap('token-html-value', m[0]);
                        i += m[0].length;
                        continue;
                    }
                    m = code.slice(i).match(fnColorRe);
                    if (m) {
                        out += wrap('token-html-value', m[0]);
                        i += m[0].length;
                        continue;
                    }
                    m = code.slice(i).match(numUnitRe);
                    if (m) {
                        out += wrap('token-js-number', m[0]);
                        i += m[0].length;
                        continue;
                    }
                    if (ch === '"' || ch === "'") {
                        const quote = ch;
                        let j = i + 1;
                        while (j < n && code[j] !== quote) {
                            if (code[j] === '\\') j++;
                            j++;
                        }
                        if (j < n) j++;
                        out += wrap('token-js-string', code.slice(i, j));
                        i = j;
                        continue;
                    }
                    m = code.slice(i).match(identRe);
                    if (m) {
                        out += wrap('token-css-value', m[0]);
                        i += m[0].length;
                        continue;
                    }
                    out += esc(ch);
                    i++;
                    continue;
                }
            }
            return out;
        }

        function highlightJS(code) {
            let escaped = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            const tokens = [];
            let pos = 0;

            const addToken = (text, type = null) => {
                if (text) {
                    tokens.push({ text, type });
                }
            };

            const patterns = [
                { regex: /(\/\*[\s\S]*?\*\/)/, type: 'token-js-comment' },
                { regex: /(\/\/[^\n]*)/gm, type: 'token-js-comment' },
                { regex: /(`(?:[^`\\]|\\.)*`)/g, type: 'token-js-string' },
                { regex: /("(?:[^"\\]|\\.)*")/g, type: 'token-js-string' },
                { regex: /('(?:[^'\\]|\\.)*')/g, type: 'token-js-string' },
                { regex: /\b(\d+\.?\d*)\b/g, type: 'token-js-number' },
            ];

            const keywords = ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'break', 'continue', 'class', 'extends', 'new', 'this', 'super', 'import', 'export', 'from', 'default', 'async', 'await', 'try', 'catch', 'finally', 'throw', 'typeof', 'instanceof', 'in', 'of', 'true', 'false', 'null', 'undefined', 'document', 'window', 'console'];
            const keywordRegex = new RegExp('\\b(' + keywords.join('|') + ')\\b', 'g');

            while (pos < escaped.length) {
                let bestMatch = null;
                let bestPattern = null;

                for (const pattern of patterns) {
                    pattern.regex.lastIndex = pos;
                    const match = pattern.regex.exec(escaped);
                    if (match && match.index === pos) {
                        bestMatch = match;
                        bestPattern = pattern;
                        break;
                    }
                }

                if (bestMatch) {
                    addToken(bestMatch[0], bestPattern.type);
                    pos = bestMatch.index + bestMatch[0].length;
                } else {
                    keywordRegex.lastIndex = pos;
                    const keywordMatch = keywordRegex.exec(escaped);
                    if (keywordMatch && keywordMatch.index === pos) {
                        addToken(keywordMatch[0], 'token-js-keyword');
                        pos = keywordMatch.index + keywordMatch[0].length;
                    } else {
                        const funcMatch = escaped.substring(pos).match(/^(\w+)(\s*\()/);
                        if (funcMatch) {
                            addToken(funcMatch[1], 'token-js-function');
                            pos += funcMatch[1].length;
                        } else {
                            addToken(escaped[pos]);
                            pos++;
                        }
                    }
                }
            }

            return tokens.map(token => {
                if (token.type) {
                    return `<span class="${token.type}">${token.text}</span>`;
                }
                return token.text;
            }).join('');
        }

        function handleInput(type) {
            const textarea = document.getElementById(`${type}Code`);
            const highlight = document.getElementById(`${type}Highlight`);
            const measure = document.getElementById(`${type}Measure`);
            const lines = document.getElementById(`${type}Lines`);

                highlightedCode = highlightCSS(code);
            } else if (type === 'js') {
                highlightedCode = highlightJS(code);

            let measureHTML = '';
            for (let i = 0; i < rawLines.length; i++) {
                const inner = htmlLines[i] || '';
                const rawText = rawLines[i];
                const isEmptyLine = rawText.length === 0;
                const safeInner = isEmptyLine ? `${inner}<br>` : inner;

                measureHTML += `<div class="ml">${safeText}</div>`;

        function escapeHTML(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function splitHighlightedByLines(html, expectedCount) {
            const out = [];
            let current = '';
            const openTagStack = [];
            let i = 0;
            while (i < html.length) {
                if (html[i] === '<') {
                    const end = html.indexOf('>', i);
                    if (end === -1) { current += html.slice(i); break; }
                    const tag = html.slice(i, end + 1);
                    if (tag.startsWith('</')) {
                        current += tag;
                        openTagStack.pop();
                    } else if (tag.endsWith('/>')) {
                        current += tag;
                    } else {
                        current += tag;
                        openTagStack.push(tag);
                    }
                    i = end + 1;
                } else {
                    const nl = html.indexOf('\n', i);
                    if (nl === -1) {
                        current += html.slice(i);
                        i = html.length;
                    } else {
                        current += html.slice(i, nl);
                        for (let k = openTagStack.length - 1; k >= 0; k--) {
                            const t = openTagStack[k];
                            const name = t.match(/^<\s*([a-zA-Z][\w-]*)/);
                            if (name) current += `</${name[1]}>`;
                        }
                        out.push(current);
                        current = '';
                        for (let k = 0; k < openTagStack.length; k++) current += openTagStack[k];
                        i = nl + 1;
                    }
                }
            }
            out.push(current);
            while (out.length < expectedCount) out.push('');
            if (out.length > expectedCount) out.length = expectedCount;
            return out;
        }

        function getCurrentWord(textarea) {

            const match = textBeforeCursor.match(/([a-zA-Z0-9_:#.!@*^>+~-]+)$/);

        function getCaretPixelPos(textarea) {
            const style = window.getComputedStyle(textarea);
            const canvas = getCaretPixelPos._canvas || (getCaretPixelPos._canvas = document.createElement('canvas'));
            const ctx = canvas.getContext('2d');
            ctx.font = `${style.fontSize} ${style.fontFamily}`;

            const value = textarea.value;
            const cursorPos = textarea.selectionStart;
            const textBeforeCursor = value.substring(0, cursorPos);
            const lines = textBeforeCursor.split('\n');
            const currentLine = lines[lines.length - 1];
            const lineIndex = lines.length - 1;

            const lineHeight = parseFloat(style.lineHeight) || parseFloat(style.fontSize) * 1.6;
            const paddingTop = parseFloat(style.paddingTop) || 15;
            const paddingLeft = parseFloat(style.paddingLeft) || 15;

            const x = paddingLeft + ctx.measureText(currentLine).width - textarea.scrollLeft;
            const y = paddingTop + lineIndex * lineHeight - textarea.scrollTop;

            return { x, y, lineHeight };
        }

        function getSuggestions(type, word) {
            if (!word || word.length < 1) return [];

            const suggestions = [];
            const lowerWord = word.toLowerCase();

            if (type === 'html') {
                for (const [abbr, expansion] of Object.entries(htmlEmmetAbbreviations)) {
                    if (abbr.toLowerCase().startsWith(lowerWord)) {
                        let previewExpansion = expansion.replace(/\\\//g, '/');
                        suggestions.push({
                            abbr,
                            expansion,
                            preview: previewExpansion.replace(/\n\s*/g, ' ').substring(0, 55) + (previewExpansion.length > 55 ? '…' : ''),
                            type: 'emmet'
                        });
                    }
                }
            } else if (type === 'css') {
                for (const [abbr, expansion] of Object.entries(cssEmmetAbbreviations)) {
                    if (abbr.toLowerCase().startsWith(lowerWord)) {
                        suggestions.push({
                            abbr,
                            expansion,
                            preview: expansion.substring(0, 55) + (expansion.length > 55 ? '…' : ''),
                            type: 'emmet'
                        });
                    }
                }
            } else if (type === 'js') {
                for (const keyword of jsKeywords) {

                        suggestions.push({
                            abbr: keyword,
                            expansion: keyword,
                            preview: keyword,
                            type: 'keyword'
                        });
                    }
                }
            }

            suggestions.sort((a, b) => {
                if (a.abbr === lowerWord) return -1;
                if (b.abbr === lowerWord) return 1;
                return a.abbr.length - b.abbr.length;
            });

            return suggestions.slice(0, 12);
        }

                    font-size: 9px; font-weight: bold; padding: 1px 4px; border-radius: 3px;
                    margin-right: 6px; flex-shrink: 0; letter-spacing: 0.5px;
                    background: ${s.type === 'emmet' ? 'rgba(80,250,123,0.2)' : 'rgba(255,184,108,0.2)'};
                    color: ${s.type === 'emmet' ? '#50fa7b' : '#ffb86c'};
                    border: 1px solid ${s.type === 'emmet' ? '#50fa7b44' : '#ffb86c44'};
                `;
                badge.textContent = s.type === 'emmet' ? 'emmet' : 'kw';
                item.appendChild(badge);

                const abbrEl = document.createElement('span');
                abbrEl.style.cssText = 'color: var(--accent); font-weight: bold; font-family: monospace; min-width: 60px;';
                abbrEl.textContent = s.abbr;
                item.appendChild(abbrEl);

                const previewEl = document.createElement('span');
                previewEl.className = 'preview';
                previewEl.textContent = s.preview;
                item.appendChild(previewEl);

                if (index === 0) {
                    const hintEl = document.createElement('span');
                    hintEl.style.cssText = 'font-size: 10px; color: #6272a4; margin-left: auto; flex-shrink: 0; padding-left: 8px;';
                    hintEl.textContent = 'Tab';
                    item.appendChild(hintEl);
                }

                item.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    selectSuggestion(type, index);
                });

                dropdown.appendChild(item);
            });

            autocompleteState[type] = {
                visible: true,
                selectedIndex: 0,
                suggestions: suggestions
            };

            dropdown.classList.add('active');
            positionDropdown(type, textarea, dropdown);
        }

        function positionDropdown(type, textarea, dropdown) {
            const { x, y, lineHeight } = getCaretPixelPos(textarea);
            const container = document.getElementById(`${type}Container`);
            const containerRect = container.getBoundingClientRect();
            const dropdownH = dropdown.offsetHeight || 200;
            const dropdownW = dropdown.offsetWidth || 260;
            const containerH = container.offsetHeight;
            const containerW = container.offsetWidth;

            let top = y + lineHeight;
            let left = x;

            if (top + dropdownH > containerH - 10) {
                top = y - dropdownH;
            }

            if (left + dropdownW > containerW - 10) {
                left = containerW - dropdownW - 10;
            }
            if (left < 5) left = 5;
            if (top < 5) top = 5;

            dropdown.style.top = `${top}px`;
            dropdown.style.left = `${left}px`;
        }

        function hideAutocomplete(type) {
            const dropdown = document.getElementById(`${type}Autocomplete`);
            dropdown.classList.remove('active');
            autocompleteState[type] = {
                visible: false,
                selectedIndex: -1,
                suggestions: []
            };
        }

        function placeCursorSmart(textarea, expansion, insertStart) {
            const cursorMarker = '{{CURSOR}}';
            let withMarker = expansion;

            if (expansion.includes('></')) {
                withMarker = expansion.replace('></', `>${cursorMarker}</`);
            } else if (expansion.includes('\n')) {
                const lines = expansion.split('\n');
                if (lines.length >= 2) {
                    let targetLine = 1;
                    for (let i = 1; i < lines.length - 1; i++) {
                        if (lines[i].trim() === '' || lines[i].match(/^\s+$/)) {
                            targetLine = i;
                            break;
                        }
                    }
                    lines[targetLine] = lines[targetLine] + cursorMarker;
                    withMarker = lines.join('\n');
                }
            }

            if (withMarker.includes(cursorMarker)) {
                const markerIndex = withMarker.indexOf(cursorMarker);
                const cleanExpansion = withMarker.replace(cursorMarker, '');
                const cursorPos = insertStart + markerIndex;
                textarea.value = textarea.value.substring(0, insertStart) + cleanExpansion + textarea.value.substring(insertStart + expansion.length);
                textarea.selectionStart = cursorPos;
                textarea.selectionEnd = cursorPos;
            } else {
                const pos = insertStart + expansion.length;
                textarea.selectionStart = pos;
                textarea.selectionEnd = pos;
            }
        }

        function selectSuggestion(type, index) {
            const textarea = document.getElementById(`${type}Code`);

            if (index < 0 || index >= autocompleteState[type].suggestions.length) return;

            const suggestion = autocompleteState[type].suggestions[index];
            const currentWord = getCurrentWord(textarea);

            const cursorPos = textarea.selectionStart;
            const wordStartPos = cursorPos - currentWord.length;
            const textBefore = textarea.value.substring(0, wordStartPos);
            const textAfter = textarea.value.substring(cursorPos);

            let expansion = suggestion.expansion.replace(/\\\//g, '/');

            if (type === 'css' && !expansion.includes(':')) {
                expansion = expansion + ': ';
            } else if (type === 'css' && !expansion.endsWith(';') && !expansion.endsWith(' ')) {
                expansion = expansion + ': ';
            }

            textarea.value = textBefore + expansion + textAfter;

            placeCursorSmart(textarea, expansion, wordStartPos);

            hideAutocomplete(type);
            handleInput(type);
            textarea.focus();
        }

        // ==================== TOGGLE COMMENT (Ctrl+/) ====================
        function toggleComment(type, textarea) {
            const val = textarea.value;
            let start = textarea.selectionStart;
            let end = textarea.selectionEnd;

            // Perluas seleksi teks ke baris penuh (full line)
            let lineStart = val.lastIndexOf('\n', start - 1) + 1;
            let lineEnd = val.indexOf('\n', end);
            if (lineEnd === -1) lineEnd = val.length;
            
            // Khusus: Jika kursor berada di paling awal baris baru, jangan ikutkan ke seleksi
            if (end > start && val.charAt(end - 1) === '\n') {
                lineEnd = end - 1;
            }

            const selectedText = val.substring(lineStart, lineEnd);
            if (selectedText === '' && lineStart === lineEnd) return; // Tidak ada teks yg bisa di comment

            let newText = '';

            if (type === 'js') {
                // Line Comment mode untuk JS //
                const lines = selectedText.split('\n');
                const allCommented = lines.every(line => line.trim() === '' || line.trim().startsWith('//'));
                
                if (allCommented) {
                    // Uncomment
                    newText = lines.map(line => line.replace(/^(\s*)\/\/\s?/, '$1')).join('\n');
                } else {
                    // Comment
                    newText = lines.map(line => {
                        if (line.trim() === '') return line;
                        const match = line.match(/^(\s*)(.*)/);
                        return match[1] + '// ' + match[2];
                    }).join('\n');
                }
            } else if (type === 'css') {
                // Block Comment mode untuk CSS /* */
                const isCommented = /^\s*\/\*[\s\S]*\*\/\s*$/.test(selectedText);
                if (isCommented) {
                    newText = selectedText.replace(/^(\s*)\/\*\s?/, '$1').replace(/\s?\*\/(\s*)$/, '$1');
                } else {
                    newText = selectedText.replace(/^(\s*)([\s\S]*?)(\s*)$/, (match, p1, p2, p3) => {
                        return p1 + '/* ' + p2 + ' */' + p3;
                    });
                }
            } else if (type === 'html') {
                // Block Comment mode untuk HTML <!-- -->
                const isCommented = /^\s*<!--[\s\S]*-->\s*$/.test(selectedText);
                if (isCommented) {
                    newText = selectedText.replace(/^(\s*)<!--\s?/, '$1').replace(/\s?-->(\s*)$/, '$1');
                } else {
                    newText = selectedText.replace(/^(\s*)([\s\S]*?)(\s*)$/, (match, p1, p2, p3) => {
                        return p1 + '<!-- ' + p2 + ' -->' + p3;
                    });
                }
            }

            // Ganti teks pada textarea dengan yang sudah dimodifikasi
            textarea.value = val.substring(0, lineStart) + newText + val.substring(lineEnd);
            
            // Pertahankan blok seleksi (sesuaikan dengan panjang karakter baru)
            textarea.selectionStart = lineStart;
            textarea.selectionEnd = lineStart + newText.length;
            
            // Update Tampilan Highlighting & Auto Save
            handleInput(type);
            autoSave();
        }

        // Handle keyboard events for autocomplete and editor shortcuts
        function handleKeyDown(event, type) {
            const state = autocompleteState[type];
            const textarea = document.getElementById(`${type}Code`);

            // --- SHORTCUT: Ctrl+/ untuk Toggle Comment ---
            if ((event.ctrlKey || event.metaKey) && event.key === '/') {
                event.preventDefault();
                toggleComment(type, textarea);
                return;
            }

            if (event.key === 'Tab') {
                event.preventDefault();
                if (state.visible) {
                    selectSuggestion(type, state.selectedIndex);
                } else {
                    const start = textarea.selectionStart;
                    const end   = textarea.selectionEnd;
                    textarea.value = textarea.value.substring(0, start) + '    ' + textarea.value.substring(end);
                    textarea.selectionStart = textarea.selectionEnd = start + 4;
                    handleInput(type);
                }
                return;
            }

            if (event.key === 'Enter') {
                if (state.visible) {
                    event.preventDefault();
                    selectSuggestion(type, state.selectedIndex);
                    return;
                }
                event.preventDefault();
                const start = textarea.selectionStart;
                const val = textarea.value;
                const lineStart = val.lastIndexOf('\n', start - 1) + 1;
                const currentLine = val.substring(lineStart, start);
                const indentMatch = currentLine.match(/^(\s*)/);
                const indent = indentMatch ? indentMatch[1] : '';
                let extraIndent = '';
                const trimmed = currentLine.trimEnd();
                if (trimmed.endsWith('{') || trimmed.endsWith('(') || trimmed.endsWith('[')) {
                    extraIndent = '    ';
                } else if (type === 'html') {
                    const openTagMatch = trimmed.match(/<([a-zA-Z][a-zA-Z0-9]*)(?:\s[^>]*)?>$/);
                    const voidTags = new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr']);
                    if (openTagMatch && !voidTags.has(openTagMatch[1].toLowerCase())) {
                        extraIndent = '    ';
                    }
                }
                const insertion = '\n' + indent + extraIndent;
                textarea.value = val.substring(0, start) + insertion + val.substring(textarea.selectionEnd);
                textarea.selectionStart = textarea.selectionEnd = start + insertion.length;
                handleInput(type);
                return;
            }

            if (!state.visible) return;

            switch (event.key) {
                case 'ArrowDown':
                    event.preventDefault();
                    state.selectedIndex = Math.min(state.selectedIndex + 1, state.suggestions.length - 1);
                    updateDropdownSelection(type);
                    break;
                case 'ArrowUp':
                    event.preventDefault();
                    state.selectedIndex = Math.max(state.selectedIndex - 1, 0);
                    updateDropdownSelection(type);
                    break;
                case 'Escape':
                    event.preventDefault();
                    hideAutocomplete(type);
                    break;
                case 'ArrowLeft':
                case 'ArrowRight':
                    hideAutocomplete(type);
                    break;
            }
        }

        function updateDropdownSelection(type) {
            const dropdown = document.getElementById(`${type}Autocomplete`);
            const items = dropdown.querySelectorAll('.autocomplete-item');

            items.forEach((item, index) => {
                if (index === autocompleteState[type].selectedIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        function checkAutocomplete(type) {
            const textarea = document.getElementById(`${type}Code`);
            const currentWord = getCurrentWord(textarea);

            if (currentWord.length >= 1) {
                showAutocomplete(type);
            } else {
                hideAutocomplete(type);
            }
        }

            });
        }

        function renderFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';

            if (projects.length === 0) {
                fileList.innerHTML = '<div style="padding:16px;color:var(--text-secondary);font-size:12px;">Klik ＋ untuk membuat project baru</div>';

                return;

                folderRow.innerHTML = `

                    activeProjectId = proj.id;
                    toggleProjectCollapse(proj.id);
                });

                const filesContainer = document.createElement('div');
                filesContainer.className = 'project-files' + (proj.collapsed ? ' collapsed' : '');
                const totalHeight = fileCount * 36;
                filesContainer.style.maxHeight = proj.collapsed ? '0' : (totalHeight + 'px');

                for (let [filename, file] of Object.entries(proj.files)) {
                    const isActive = currentEditingFile.projectId === proj.id && currentEditingFile.filename === filename;
                    const fileItem = document.createElement('div');
                    fileItem.className = 'file-item' + (isActive ? ' active' : '');

                    let icon = '📄';
                    if (file.type === 'html') icon = '🌐';
                    else if (file.type === 'css') icon = '🎨';
                    else if (file.type === 'js') icon = '⚡';
                    else if (file.type === 'json') icon = '🧾';
                    else if (file.type === 'svg') icon = '🖼️';
                    else if (file.type === 'image') icon = '🖼️';
                    else if (file.type === 'env') icon = '🔐';

                    const safeFn = filename.replace(/'/g, "\\'");
                    fileItem.innerHTML = `
                        <span class="file-icon ${file.type}">${icon}</span>
                        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${filename}</span>
                        <div style="display:flex;gap:4px;flex-shrink:0;">
                            <span style="cursor:pointer;opacity:0.6;font-size:13px;" title="Rename" onclick="event.stopPropagation();showRenameModal('${proj.id}','${safeFn}')">✎</span>
                            <span style="cursor:pointer;opacity:0.6;font-size:13px;" title="Delete" onclick="event.stopPropagation();deleteFile('${proj.id}','${safeFn}')">✕</span>
                        </div>
                    `;
                    fileItem.addEventListener('click', () => openFile(proj.id, filename));
                    filesContainer.appendChild(fileItem);
                }
                fileList.appendChild(filesContainer);
            });

            updateFileCount();
        }

        function openFile(projectId, filename) {
            saveCurrentFile();

            const proj = getProject(projectId);
            if (!proj) return;
            const file = proj.files[filename];
            if (!file) { alert('File not found: ' + filename); return; }

            activeProjectId = projectId;
            currentEditingFile = { filename, type: file.type, projectId };

            ['html', 'css', 'js'].forEach(t => {
                const ov = document.getElementById(`${t}AssetPreview`);
                if (ov) ov.classList.remove('active');
            });

            const tab = getEditorTabForType(file.type);
            switchEditorTab(tab);

            if (isBinaryType(file.type)) {
                const ed = document.getElementById(`${tab}Code`);
                ed.value = '';
                handleInput(tab);
                showAssetPreview(tab, filename, file);
            } else {
                const ed = document.getElementById(`${tab}Code`);
                ed.value = file.content || '';
                handleInput(tab);
            }

            showEditor();
            renderFileList();
            updateStatus('Editing: ' + filename);
        }

        function showAssetPreview(tab, filename, file) {
            const ov = document.getElementById(`${tab}AssetPreview`);
            if (!ov) return;
            const mime = getMimeForFile(filename, file.type);
            const src = (typeof file.content === 'string' && file.content.startsWith('data:'))
                ? file.content
                : 'data:' + mime + ';base64,' + (file.content || '');
            ov.innerHTML = `
                <div class="asset-name">${filename}</div>
                <img alt="${filename}" src="${src}">
                <div class="asset-meta">${mime} — preview only (binary asset)</div>
                <div class="asset-meta">Reference it in HTML/CSS/JS by its filename, e.g. <code>&lt;img src="${filename}"&gt;</code></div>
            `;
            ov.classList.add('active');
        }

        function saveCurrentFile() {
            if (!currentEditingFile.filename || !currentEditingFile.projectId) return;
            const proj = getProject(currentEditingFile.projectId);
            if (!proj || !proj.files[currentEditingFile.filename]) return;
            const file = proj.files[currentEditingFile.filename];
            if (isBinaryType(file.type)) return;
            const tab = getEditorTabForType(file.type);
            const content = getContentForType(tab);
            file.content = content;
        }

        function getContentForType(type) {
            if (type === 'html') return document.getElementById('htmlCode').value;
            if (type === 'css')  return document.getElementById('cssCode').value;
            if (type === 'js')   return document.getElementById('jsCode').value;
            return '';
        }

        function deleteFile(projectId, filename) {
            if (!confirm('Delete ' + filename + '?')) return;
            const proj = getProject(projectId);
            if (!proj) return;
            const file = proj.files[filename];
            if (currentEditingFile.projectId === projectId && currentEditingFile.filename === filename) {
                const tab = getEditorTabForType(file.type);
                document.getElementById(`${tab}Code`).value = '';
                handleInput(tab);
                const ov = document.getElementById(`${tab}AssetPreview`);
                if (ov) ov.classList.remove('active');
                currentEditingFile = { filename: null, type: null, projectId: null };
            }
            delete proj.files[filename];
            renderFileList();
            saveProjectsToStorage();
            updateStatus('Deleted: ' + filename);
        }

        function showRenameModal(projectId, filename) {
            fileToRename = { filename, projectId };
            const input = document.getElementById('renameFileName');
            input.value = filename;
            document.getElementById('renameFileModal').classList.add('active');
            input.focus();
            const lastDotIndex = filename.lastIndexOf('.');
            if (lastDotIndex > 0) input.setSelectionRange(0, lastDotIndex);
            else input.select();
        }

        function renameFile() {
            const newFilename = document.getElementById('renameFileName').value.trim();
            if (!newFilename) { alert('Please enter a filename!'); return; }
            if (!fileToRename) return;

            const { filename: oldName, projectId } = fileToRename;
            const proj = getProject(projectId);
            if (!proj) return;

            if (newFilename === oldName) { closeModal('renameFileModal'); return; }
            if (proj.files[newFilename]) { alert('File "' + newFilename + '" already exists!'); return; }

            const oldExtension = (oldName.includes('.') ? oldName.split('.').pop() : '').toLowerCase();
            const newExtension = (newFilename.includes('.') ? newFilename.split('.').pop() : '').toLowerCase();
            if (oldExtension !== newExtension) { alert('File extension must be ".' + oldExtension + '"!'); return; }

            proj.files[newFilename] = proj.files[oldName];
            delete proj.files[oldName];
            if (currentEditingFile.projectId === projectId && currentEditingFile.filename === oldName) {
                currentEditingFile.filename = newFilename;
            }
            renderFileList();
            saveProjectsToStorage();
            closeModal('renameFileModal');
            updateStatus('Renamed: ' + oldName + ' → ' + newFilename);
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileType = getFileTypeFromName(file.name);
            const reader = new FileReader();

            reader.onload = function(e) {
                const content = e.target.result;

                selectedUploadedFile = {
                    name: file.name,
                    content: content, 
                    type: fileType
                };

                const uploadBtn = document.getElementById('fileUploadBtn');
                const fileNameDisplay = document.getElementById('selectedFileName');

                uploadBtn.classList.add('selected');
                uploadBtn.textContent = '✓ File selected: ' + file.name;
                fileNameDisplay.textContent = '📄 ' + file.name + ' (' + formatFileSize(file.size) + ')';
                fileNameDisplay.classList.add('show');

                document.getElementById('newFileName').value = file.name;
            };

            reader.onerror = function() {
                alert('Error reading file. Please try again.');
            };

            if (isBinaryType(fileType)) {
                reader.readAsDataURL(file);
            } else {
                reader.readAsText(file);
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            else if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            else return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function resetFileUpload() {
            selectedUploadedFile = null;
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('fileUploadBtn');
            const fileNameDisplay = document.getElementById('selectedFileName');

            const projId = newFileTargetProjectId || activeProjectId;

        function runPreview() {
            saveCurrentFile();

            if (currentMainTab !== 'preview') {
                switchMainTab('preview');
                return;
            }

            let htmlContent = '';
            let proj = null;

            if (currentEditingFile.filename && currentEditingFile.type === 'html' && currentEditingFile.projectId) {
                proj = getProject(currentEditingFile.projectId);
                if (proj && proj.files[currentEditingFile.filename]) {
                    htmlContent = proj.files[currentEditingFile.filename].content || '';
                }
            } else if (activeProjectId) {
                proj = getActiveProject();
                if (proj) {
                    for (let [fn, f] of Object.entries(proj.files)) {
                        if (f.type === 'html') { htmlContent = f.content || ''; break; }
                    }
                }
            }

            if (!htmlContent) {
                showToast('⚠️ Tidak ada file HTML aktif untuk di-preview', 'info');
                return;
            }

            let fullHTML = htmlContent;

            const buildAssetUrl = (filename, file) => {
                if (!file) return null;
                if (file.type === 'image') {
                    return file.content || null;
                }
                const mime = getMimeForFile(filename, file.type);
                const text = file.content || '';
                try {
                    const b64 = btoa(unescape(encodeURIComponent(text)));
                    return 'data:' + mime + ';base64,' + b64;
                } catch (e) {
                    return 'data:' + mime + ',' + encodeURIComponent(text);
                }
            };

            if (proj) {
                fullHTML = fullHTML.replace(
                    /<link\s[^>]*rel=["']stylesheet["'][^>]*>/gi,
                    (tag) => {
                        const hrefMatch = tag.match(/href=["']([^"']+)["']/i);
                        if (!hrefMatch) return tag;
                        const href = hrefMatch[1];
                        const isLocal = !/^https?:\/\//i.test(href) && !/^\/\//i.test(href) && !/^data:/i.test(href);
                        if (isLocal && proj.files[href] && proj.files[href].type === 'css') {
                            return '<style>\n' + (proj.files[href].content || '') + '\n</style>';
                        }
                        return tag;
                    }
                );

                fullHTML = fullHTML.replace(
                    /<script\b[^>]*\bsrc=["']([^"']+)["'][^>]*>\s*<\/script>/gi,
                    (tag, src) => {
                        const isLocal = !/^https?:\/\//i.test(src) && !/^\/\//i.test(src) && !/^data:/i.test(src);
                        if (isLocal && proj.files[src]) {
                            const f = proj.files[src];
                            if (f.type === 'js') {
                                return '<script>\n' + (f.content || '') + '\n<\/script>';
                            }
                            if (f.type === 'json') {
                                const safe = (f.content || 'null').replace(/<\/script/gi, '<\\/script');
                                const key = src.replace(/[^a-zA-Z0-9_]/g, '_');
                                return '<script>try{window["' + src + '"]=JSON.parse(' + JSON.stringify(safe) + ');window["' + key + '"]=window["' + src + '"];}catch(e){console.error("Invalid JSON in ' + src + '",e);}<\/script>';
                            }
                        }
                        return tag;
                    }
                );

                const rewriteAttr = (attr) => new RegExp('\\b' + attr + '=(["\'])([^"\']+)\\1', 'gi');
                ['src', 'href', 'poster', 'data'].forEach(attr => {
                    fullHTML = fullHTML.replace(rewriteAttr(attr), (full, q, val) => {
                        const isLocal = !/^https?:\/\//i.test(val) && !/^\/\//i.test(val) && !/^data:/i.test(val) && !/^#/.test(val) && !/^mailto:/i.test(val) && !/^javascript:/i.test(val);
                        if (!isLocal) return full;
                        const file = proj.files[val];
                        if (!file) return full;
                        if (file.type === 'css' || file.type === 'js') return full;
                        const url = buildAssetUrl(val, file);
                        return url ? (attr + '=' + q + url + q) : full;
                    });
                });

                fullHTML = fullHTML.replace(/<style\b[^>]*>([\s\S]*?)<\/style>/gi, (full, css) => {
                    const newCss = css.replace(/url\(\s*(['"]?)([^'")]+)\1\s*\)/g, (m, q, val) => {
                        const isLocal = !/^https?:\/\//i.test(val) && !/^\/\//i.test(val) && !/^data:/i.test(val) && !/^#/.test(val);
                        if (!isLocal) return m;
                        const file = proj.files[val];
                        if (!file) return m;
                        const url = buildAssetUrl(val, file);
                        return url ? ('url(' + q + url + q + ')') : m;
                    });
                    return full.replace(css, newCss);
                });
            }

            const preview = document.getElementById('previewFrame');
            const previewDoc = preview.contentDocument || preview.contentWindow.document;
            previewDoc.open();
            previewDoc.write(fullHTML);
            previewDoc.close();

            saveProjectsToStorage();
            updateStatus('Preview updated!');
        }

        function downloadAll() {
            if (projects.length === 0) { showToast('Tidak ada project!', 'info'); return; }

            saveCurrentFile();

            if (typeof JSZip === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                script.onload = () => doZipExport();
                script.onerror = () => fallbackDownload();
                document.head.appendChild(script);
            } else {
                doZipExport();
            }
        }

        function doZipExport() {
            const zip = new JSZip();
            projects.forEach(proj => {
                const folder = zip.folder(proj.name);
                for (let [filename, file] of Object.entries(proj.files)) {
                    folder.file(filename, file.content || '');
                }
            });
            zip.generateAsync({ type: 'blob' }).then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'projects.zip';
                a.click();
                URL.revokeObjectURL(url);
                updateStatus('ZIP downloaded!');
            });
        }

        function fallbackDownload() {
            projects.forEach(proj => {
                for (let [filename, file] of Object.entries(proj.files)) {
                    const blob = new Blob([file.content || ''], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = proj.name + '_' + filename;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            });
            updateStatus('Files downloaded!');
        }

        function scalePreview() {
            const device = document.getElementById('deviceSelect').value;

            if (device !== 'mobile' && device !== 'tablet') {
                return;
            }

            const container = document.querySelector('.preview-container');
            const wrapper = document.getElementById('previewWrapper');

            const deviceDimensions = {
                mobile: { width: 375, height: 667 },
                tablet: { width: 768, height: 1024 }
            };

            const dim = deviceDimensions[device];
            if (!dim) return;

            const availableWidth = container.clientWidth - 40;
            const availableHeight = container.clientHeight - 40;

            const scaleX = availableWidth / dim.width;
            const scaleY = availableHeight / dim.height;

            let scale = Math.min(scaleX, scaleY);

            if (scale > 1) {
                scale = 1;
            }

            wrapper.style.transform = `scale(${scale.toFixed(4)})`;
        }

        // ==================== BEAUTIFIER ENGINE ====================

        function showToast(msg, type = 'success', duration = 2200) {
