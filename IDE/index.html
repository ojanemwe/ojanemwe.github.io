        function beautifyHTML(html) {
            const INDENT = '    ';
            const inlineTags = new Set(['a','abbr','acronym','b','bdo','big','br','button','cite',
                'code','dfn','em','i','img','input','kbd','label','map','object','output',
                'q','samp','select','small','span','strong','sub','sup','textarea','time',
                'tt','u','var']);
            const voidTags = new Set(['area','base','br','col','embed','hr','img','input',
                'link','meta','param','source','track','wbr']);

            let result = '';
            let depth = 0;
            let i = 0;
            const len = html.length;

            function indent() { return INDENT.repeat(Math.max(0, depth)); }

            function flushText(text) {
                const t = text.trim();
                if (!t) return;
                result += indent() + t + '\n';
            }

            let textBuf = '';

            while (i < len) {
                if (html.slice(i, i+9).toLowerCase() === '<!doctype') {
                    flushText(textBuf); textBuf = '';
                    const end = html.indexOf('>', i);
                    result += html.slice(i, end + 1) + '\n';
                    i = end + 1;
                    continue;
                }
                if (html.slice(i, i+4) === '<!--') {
                    flushText(textBuf); textBuf = '';
                    const end = html.indexOf('-->', i);
                    if (end === -1) { result += indent() + html.slice(i) + '\n'; break; }
                    const comment = html.slice(i, end + 3);
                    result += indent() + comment.trim() + '\n';
                    i = end + 3;
                    continue;
                }
                if (html.slice(i, i+7).toLowerCase() === '<script' || html.slice(i, i+6).toLowerCase() === '<style') {
                    flushText(textBuf); textBuf = '';
                    const isScript = html.slice(i, i+7).toLowerCase() === '<script';
                    const tagName = isScript ? 'script' : 'style';
                    const closeTag = `</${tagName}`;
                    const openEnd = html.indexOf('>', i);
                    const openTag = html.slice(i, openEnd + 1);
                    const closeIdx = html.toLowerCase().indexOf(closeTag, openEnd);
                    if (closeIdx === -1) { result += indent() + html.slice(i) + '\n'; break; }
                    const inner = html.slice(openEnd + 1, closeIdx);
                    const closeEnd = html.indexOf('>', closeIdx);
                    const closeTagFull = html.slice(closeIdx, closeEnd + 1);
                    const innerLines = inner.split('\n').map(l => l.trim()).filter(l => l);
                    result += indent() + openTag + '\n';
                    depth++;
                    innerLines.forEach(l => { result += indent() + l + '\n'; });
                    depth--;
                    result += indent() + closeTagFull + '\n';
                    i = closeEnd + 1;
                    continue;
                }
                if (html[i] === '<') {
                    flushText(textBuf); textBuf = '';
                    const end = html.indexOf('>', i);
                    if (end === -1) { result += html.slice(i); break; }
                    const raw = html.slice(i, end + 1);
                    const isClose  = raw[1] === '/';
                    const isSingle = raw[raw.length - 2] === '/';
                    const tagMatch = raw.match(/^<\/?([a-zA-Z][a-zA-Z0-9]*)/);
                    const tagName  = tagMatch ? tagMatch[1].toLowerCase() : '';
                    const isVoid   = voidTags.has(tagName);
                    const isInline = inlineTags.has(tagName);

                    if (isClose) {
                        depth = Math.max(0, depth - 1);
                        result += indent() + raw + '\n';
                    } else if (isVoid || isSingle) {
                        result += indent() + raw + '\n';
                    } else {
                        result += indent() + raw + '\n';
                        if (!isInline) depth++;
                    }
                    i = end + 1;
                    continue;
                }
                textBuf += html[i];
                i++;
            }
            flushText(textBuf);
            return result.replace(/\n{3,}/g, '\n\n').trim();
        }

        function beautifyCSS(css) {
            const INDENT = '    ';
            const tokens = [];
            let i = 0;
            while (i < css.length) {
                if (css.slice(i, i+2) === '/*') {
                    const end = css.indexOf('*/', i + 2);
                    if (end === -1) { tokens.push({ type: 'comment', val: css.slice(i) }); break; }
                    tokens.push({ type: 'comment', val: css.slice(i, end + 2) });
                    i = end + 2; continue;
                }
                if (css[i] === '"' || css[i] === "'") {
                    const q = css[i]; let j = i + 1;
                    while (j < css.length && css[j] !== q) { if (css[j] === '\\') j++; j++; }
                    tokens.push({ type: 'string', val: css.slice(i, j + 1) });
                    i = j + 1; continue;
                }
                if (css[i] === '{') { tokens.push({ type: 'open' }); i++; continue; }
                if (css[i] === '}') { tokens.push({ type: 'close' }); i++; continue; }
                if (css[i] === ';') { tokens.push({ type: 'semi' }); i++; continue; }
                let j = i;
                while (j < css.length && !'{};\'"'.includes(css[j]) && css.slice(j,j+2) !== '/*') j++;
                if (j > i) tokens.push({ type: 'text', val: css.slice(i, j) });
                i = j;
            }

            let result = '';
            let depth = 0;
            let buf = '';

            function ind() { return INDENT.repeat(depth); }

            for (const tok of tokens) {
                if (tok.type === 'comment') {
                    if (buf.trim()) { result += ind() + buf.trim() + '\n'; buf = ''; }
                    result += tok.val.split('\n').map((l, idx) =>
                        idx === 0 ? ind() + l.trimStart() : ind() + ' ' + l.trim()
                    ).join('\n') + '\n';
                } else if (tok.type === 'open') {
                    result += (buf.trim() ? ' ' : ind()) + '{\n';
                    buf = '';
                    depth++;
                } else if (tok.type === 'close') {
                    if (buf.trim()) { result += ind() + buf.trim() + ';\n'; buf = ''; }
                    depth = Math.max(0, depth - 1);
                    result += ind() + '}\n\n';
                } else if (tok.type === 'semi') {
                    result += ind() + buf.trim() + ';\n';
                    buf = '';
                } else {
                    buf += tok.val;
                }
            }
            if (buf.trim()) result += buf.trim() + '\n';
            return result.replace(/\n{3,}/g, '\n\n').trim();
        }

        function beautifyJS(js) {
            const INDENT = '    ';
            let result = '';
            let depth = 0;
            let i = 0;
            let newline = true; 

            function ind() { return INDENT.repeat(Math.max(0, depth)); }
            function emit(s) {
                if (newline && s.trim()) { result += ind(); newline = false; }
                result += s;
            }
            function nl() { result += '\n'; newline = true; }

            while (i < js.length) {
                if (js.slice(i, i+2) === '//') {
                    const end = js.indexOf('\n', i);
                    const line = end === -1 ? js.slice(i) : js.slice(i, end);
                    emit(line.trim());
                    nl();
                    i = end === -1 ? js.length : end + 1;
                    continue;
                }
                if (js.slice(i, i+2) === '/*') {
                    const end = js.indexOf('*/', i + 2);
                    const comment = end === -1 ? js.slice(i) : js.slice(i, end + 2);
                    comment.split('\n').forEach((l, idx) => {
                        emit(idx === 0 ? l.trimStart() : ' ' + l.trim());
                        nl();
                    });
                    i = end === -1 ? js.length : end + 2;
                    continue;
                }
                if (js[i] === '`') {
                    let j = i + 1;
                    while (j < js.length) {
                        if (js[j] === '\\') { j += 2; continue; }
                        if (js[j] === '`') { j++; break; }
                        j++;
                    }
                    emit(js.slice(i, j));
                    i = j;
                    continue;
                }
                if (js[i] === '"' || js[i] === "'") {
                    const q = js[i]; let j = i + 1;
                    while (j < js.length && js[j] !== q) { if (js[j] === '\\') j++; j++; }
                    emit(js.slice(i, j + 1));
                    i = j + 1;
                    continue;
                }
                const prevResult = result.trimEnd();
                const lastChar = prevResult ? prevResult[prevResult.length - 1] : '';
                if (js[i] === '/' && '(,=![&|?:{;'.includes(lastChar)) {
                    let j = i + 1;
                    while (j < js.length && js[j] !== '/' && js[j] !== '\n') {
                        if (js[j] === '\\') j++;
                        j++;
                    }
                    if (js[j] === '/') j++;
                    while (j < js.length && /[gimsuy]/.test(js[j])) j++;
                    emit(js.slice(i, j));
                    i = j;
                    continue;
                }

                const ch = js[i];

                if (ch === '{') {
                    emit(' {');
                    nl();
                    depth++;
                    i++;
                    continue;
                }
                if (ch === '}') {
                    depth = Math.max(0, depth - 1);
                    if (!newline) nl();
                    emit('}');
                    let peek = i + 1;
                    while (peek < js.length && /[ \t]/.test(js[peek])) peek++;
                    const after = js.slice(peek, peek+7);
                    if (/^(else|catch|finally)/.test(after)) {
                        result += ' ';
                        newline = false;
                    } else {
                        nl();
                        if (depth === 0) nl();
                    }
                    i++;
                    continue;
                }
                if (ch === ';') {
                    emit(';');
                    nl();
                    i++;
                    continue;
                }
                if (ch === '\n') {
                    if (result.endsWith('\n\n')) { i++; continue; }
                    if (!newline) nl();
                    i++;
                    continue;
                }
                if (ch === '\r') { i++; continue; }
                if (ch === '\t') { emit('    '); i++; continue; }
                if (ch === ' ') {
                    if (!newline) emit(' ');
                    i++;
                    continue;
                }
                emit(ch);
                i++;
            }
            return result.replace(/\n{3,}/g, '\n\n').trim();
        }

        function beautifyCurrentFile() {
            if (!currentEditingFile || !currentEditingFile.filename) {
                showToast('⚠️ Tidak ada file yang sedang diedit', 'error');
                return;
            }

            const type = currentEditingFile.type;
            const textarea = document.getElementById(`${type}Code`);
            if (!textarea) return;

            const original = textarea.value;
            if (!original.trim()) {
                showToast('⚠️ Editor kosong', 'info');
                return;
            }

            let formatted = '';
            try {
                if (type === 'html')      formatted = beautifyHTML(original);
                else if (type === 'css')  formatted = beautifyCSS(original);
                else if (type === 'js')   formatted = beautifyJS(original);
                else {
                    showToast('ℹ️ Tipe file ini belum didukung', 'info');
                    return;
                }
            } catch (e) {
                showToast('❌ Gagal memformat: ' + e.message, 'error');
                return;
            }

            if (formatted === original.trim()) {
                showToast('✅ Kode sudah rapi!', 'info');
                return;
            }

            textarea.value = formatted;
            handleInput(type);
            autoSave();

            const btn = document.getElementById('beautifyBtn');
            if (btn) {
                btn.classList.remove('running');
                void btn.offsetWidth;
                btn.classList.add('running');
                setTimeout(() => btn.classList.remove('running'), 600);
            }

            showToast(`✨ ${currentEditingFile.filename} berhasil diformat!`, 'success');
        }

        // ====================================================================
        // FIND & REPLACE (VSCode-like)
        // ====================================================================
        const findState = {
            html: { query: '', replace: '', caseSensitive: false, regex: false, wholeWord: false, matches: [], current: -1, replaceVisible: false },
            css:  { query: '', replace: '', caseSensitive: false, regex: false, wholeWord: false, matches: [], current: -1, replaceVisible: false },
            js:   { query: '', replace: '', caseSensitive: false, regex: false, wholeWord: false, matches: [], current: -1, replaceVisible: false },
        };

        function buildFindPanel(type) {
            const panel = document.getElementById(`${type}FindPanel`);
            if (!panel || panel.dataset.built === '1') return;
            panel.dataset.built = '1';
            panel.innerHTML = `
                <div class="find-replace-row" data-row="find">
                    <button class="find-btn toggle" data-action="toggle-replace" title="Toggle Replace (Ctrl+H)">▸</button>
                    <input type="text" data-role="find" placeholder="Find" autocomplete="off" spellcheck="false">
                    <span class="find-count" data-role="count">No results</span>
                    <button class="find-btn toggle" data-action="case" title="Match Case (Alt+C)">Aa</button>
                    <button class="find-btn toggle" data-action="word" title="Whole Word (Alt+W)">ab</button>
                    <button class="find-btn toggle" data-action="regex" title="Regex (Alt+R)">.*</button>
                    <button class="find-btn" data-action="prev" title="Previous (Shift+Enter)">▲</button>
                    <button class="find-btn" data-action="next" title="Next (Enter)">▼</button>
                    <button class="find-btn" data-action="close" title="Close (Esc)">✕</button>
                </div>
                <div class="find-replace-row" data-row="replace" style="display:none;">
                    <span style="width:24px;"></span>
                    <input type="text" data-role="replace" placeholder="Replace" autocomplete="off" spellcheck="false">
                    <button class="find-btn" data-action="replace-one" title="Replace">⤷</button>
                    <button class="find-btn" data-action="replace-all" title="Replace All">⇄</button>
                    <span style="flex:0 0 auto;width:60px;"></span>
                </div>
            `;

            const findInput = panel.querySelector('[data-role="find"]');
            const replaceInput = panel.querySelector('[data-role="replace"]');

            findInput.addEventListener('input', () => {
                findState[type].query = findInput.value;
                runFindHighlights(type, true);
            });
            findInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (e.shiftKey) findGoto(type, -1);
                    else findGoto(type, +1);
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closeFindPanel(type);
                }
            });
            replaceInput.addEventListener('input', () => {
                findState[type].replace = replaceInput.value;
            });
            replaceInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    replaceOne(type);
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    closeFindPanel(type);
                }
            });

            panel.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-action]');
                if (!btn) return;
                const action = btn.dataset.action;
                if (action === 'next') findGoto(type, +1);
                else if (action === 'prev') findGoto(type, -1);
                else if (action === 'close') closeFindPanel(type);
                else if (action === 'replace-one') replaceOne(type);
                else if (action === 'replace-all') replaceAll(type);
                else if (action === 'toggle-replace') toggleReplaceRow(type);
                else if (action === 'case') { findState[type].caseSensitive = !findState[type].caseSensitive; btn.classList.toggle('active'); runFindHighlights(type); }
                else if (action === 'word') { findState[type].wholeWord = !findState[type].wholeWord; btn.classList.toggle('active'); runFindHighlights(type); }
                else if (action === 'regex') { findState[type].regex = !findState[type].regex; btn.classList.toggle('active'); runFindHighlights(type); }
            });
        }

        function openFindPanel(type, withReplace) {
            buildFindPanel(type);
            const panel = document.getElementById(`${type}FindPanel`);
            panel.classList.add('active');
            if (withReplace) showReplaceRow(type, true);
            const findInput = panel.querySelector('[data-role="find"]');
            const ta = document.getElementById(`${type}Code`);
            const sel = ta.value.substring(ta.selectionStart, ta.selectionEnd);
            if (sel && !sel.includes('\n')) {
                findInput.value = sel;
                findState[type].query = sel;
            }
            findInput.focus();
            findInput.select();
            if (findState[type].query) runFindHighlights(type, true);
        }

        function closeFindPanel(type) {
            const panel = document.getElementById(`${type}FindPanel`);
            if (!panel) return;
            panel.classList.remove('active');
            findState[type].query = '';
            findState[type].matches = [];
            findState[type].current = -1;
            handleInput(type);
            const ta = document.getElementById(`${type}Code`);
            ta.focus();
        }

        function toggleReplaceRow(type) {
            const panel = document.getElementById(`${type}FindPanel`);
            const row = panel.querySelector('[data-row="replace"]');
            const btn = panel.querySelector('[data-action="toggle-replace"]');
            const visible = row.style.display !== 'none';
            showReplaceRow(type, !visible);
        }
        function showReplaceRow(type, visible) {
            const panel = document.getElementById(`${type}FindPanel`);
            const row = panel.querySelector('[data-row="replace"]');
            const btn = panel.querySelector('[data-action="toggle-replace"]');
            row.style.display = visible ? 'flex' : 'none';
            btn.textContent = visible ? '▾' : '▸';
            findState[type].replaceVisible = visible;
        }

        function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

        function buildFindRegex(type) {
            const st = findState[type];
            if (!st.query) return null;
            let pattern = st.regex ? st.query : escapeRegex(st.query);
            if (st.wholeWord) pattern = `\\b${pattern}\\b`;
            const flags = 'g' + (st.caseSensitive ? '' : 'i');
            try { return new RegExp(pattern, flags); } catch (e) { return null; }
        }

        function computeMatches(type) {
            const st = findState[type];
            const ta = document.getElementById(`${type}Code`);
            const text = ta.value;
            const re = buildFindRegex(type);
            const out = [];
            if (!re) { st.matches = []; return; }
            let m;
            let safety = 0;
            while ((m = re.exec(text)) !== null) {
                if (m.index === re.lastIndex) re.lastIndex++; 
                out.push({ start: m.index, end: m.index + m[0].length });
                if (++safety > 50000) break;
            }
            st.matches = out;
            if (st.current >= out.length) st.current = out.length - 1;
        }

        function runFindHighlights(type, moveToFirst) {
            computeMatches(type);
            const st = findState[type];
            const panel = document.getElementById(`${type}FindPanel`);
            const findInput = panel ? panel.querySelector('[data-role="find"]') : null;
            const countEl = panel ? panel.querySelector('[data-role="count"]') : null;

            const highlight = document.getElementById(`${type}Highlight`);
            highlight.querySelectorAll('mark.find-match').forEach(mk => {
                const parent = mk.parentNode;
                while (mk.firstChild) parent.insertBefore(mk.firstChild, mk);
                parent.removeChild(mk);
                parent.normalize && parent.normalize();
            });

            if (!st.query || st.matches.length === 0) {
                if (findInput) findInput.classList.toggle('no-match', !!st.query);
                if (countEl) {
                    countEl.textContent = st.query ? 'No results' : 'No results';
                    countEl.classList.toggle('no-match', !!st.query);
                }
                st.current = -1;
                return;
            }

            if (findInput) findInput.classList.remove('no-match');
            if (countEl) countEl.classList.remove('no-match');

            if (moveToFirst || st.current < 0 || st.current >= st.matches.length) st.current = 0;

            const ta = document.getElementById(`${type}Code`);
            const text = ta.value;
            const lineEls = highlight.querySelectorAll('.cl');
            const lineStarts = [0];
            for (let i = 0; i < text.length; i++) {
                if (text[i] === '\n') lineStarts.push(i + 1);
            }
            for (let li = 0; li < lineEls.length; li++) {
                const lineStart = lineStarts[li] ?? 0;
                const lineEnd = (li + 1 < lineStarts.length) ? lineStarts[li + 1] - 1 : text.length;
                const inLine = [];
                for (let mi = 0; mi < st.matches.length; mi++) {
                    const mt = st.matches[mi];
                    if (mt.end <= lineStart) continue;
                    if (mt.start >= lineEnd) break; 
                    inLine.push({
                        idx: mi,
                        start: Math.max(0, mt.start - lineStart),
                        end: Math.min(lineEnd - lineStart, mt.end - lineStart),
                    });
                }
                if (inLine.length === 0) continue;
                wrapMatchesInElement(lineEls[li], inLine, st.current);
            }

            if (countEl) countEl.textContent = `${st.current + 1} of ${st.matches.length}`;

            scrollCurrentMatchIntoView(type);
        }

        function wrapMatchesInElement(el, ranges, currentGlobalIdx) {
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
            const nodes = [];
            let offset = 0;
            let n;
            while ((n = walker.nextNode())) {
                nodes.push({ node: n, start: offset, end: offset + n.nodeValue.length });
                offset += n.nodeValue.length;
            }
            for (let r = ranges.length - 1; r >= 0; r--) {
                const range = ranges[r];
                if (range.start >= range.end) continue;
                for (let i = nodes.length - 1; i >= 0; i--) {
                    const info = nodes[i];
                    if (info.end <= range.start) break;
                    if (info.start >= range.end) continue;
                    const localStart = Math.max(range.start, info.start) - info.start;
                    const localEnd   = Math.min(range.end,   info.end)   - info.start;
                    if (localStart >= localEnd) continue;
                    let node = info.node;
                    if (localEnd < node.nodeValue.length) {
                        node.splitText(localEnd);
                    }
                    let middle = node;
                    if (localStart > 0) {
                        middle = node.splitText(localStart);
                    }
                    const mark = document.createElement('mark');
                    mark.className = 'find-match' + (range.idx === currentGlobalIdx ? ' current' : '');
                    middle.parentNode.insertBefore(mark, middle);
                    mark.appendChild(middle);
                }
            }
        }

        function scrollCurrentMatchIntoView(type) {
            const st = findState[type];
            if (st.current < 0 || !st.matches[st.current]) return;
            const m = st.matches[st.current];
            const ta = document.getElementById(`${type}Code`);
            try {
                ta.focus({ preventScroll: true });
                ta.setSelectionRange(m.start, m.end);
                const before = ta.value.substring(0, m.start);
                const lineCount = (before.match(/\n/g) || []).length;
                const lineHeight = parseFloat(getComputedStyle(ta).lineHeight) || 22;
                const desiredTop = Math.max(0, lineCount * lineHeight - ta.clientHeight / 2);
                ta.scrollTop = desiredTop;
                syncScroll(type);
            } catch (e) {}
            const panel = document.getElementById(`${type}FindPanel`);
            const findInput = panel && panel.querySelector('[data-role="find"]');
            if (findInput) findInput.focus();
        }

        function findGoto(type, dir) {
            const st = findState[type];
            if (st.matches.length === 0) return;
            st.current = (st.current + dir + st.matches.length) % st.matches.length;
            const highlight = document.getElementById(`${type}Highlight`);
            highlight.querySelectorAll('mark.find-match').forEach(mk => mk.classList.remove('current'));
            runFindHighlights(type, false);
        }

        function replaceOne(type) {
            const st = findState[type];
            if (!st.query) return;
            computeMatches(type);
            if (st.matches.length === 0) return;
            if (st.current < 0 || st.current >= st.matches.length) st.current = 0;
            const m = st.matches[st.current];
            const ta = document.getElementById(`${type}Code`);
            const before = ta.value.substring(0, m.start);
            const after  = ta.value.substring(m.end);
            const replacement = st.replace || '';
            ta.value = before + replacement + after;
            const pos = m.start + replacement.length;
            ta.selectionStart = ta.selectionEnd = pos;
            handleInput(type); 
            findGoto(type, 0);
        }

        function replaceAll(type) {
            const st = findState[type];
            if (!st.query) return;
            const re = buildFindRegex(type);
            if (!re) return;
            const ta = document.getElementById(`${type}Code`);
            const original = ta.value;
            const replaced = original.replace(re, st.replace || '');
            if (replaced === original) {
                showToast && showToast('No matches replaced', 'info');
                return;
            }
            ta.value = replaced;
            handleInput(type);
            updateStatus && updateStatus(`Replaced all occurrences of "${st.query}"`);
        }

        function getCurrentEditorType() {
            return currentEditorTab || 'html';
        }

        function init() {
            loadProjectFromStorage();
            updateFileCount();
            handleInput('html');
            handleInput('css');
            handleInput('js');
            applyWordWrap(); 
            setupEditorResizeObservers();

            const wrapper = document.getElementById('previewWrapper');
            const container = document.querySelector('.preview-container');
            if (wrapper) wrapper.classList.add('mode-desktop');
            if (container) container.classList.add('mode-desktop');

            if (!window.autocompleteListenersAdded) {
                ['html', 'css', 'js'].forEach(type => {
                    const textarea = document.getElementById(`${type}Code`);
                    const dropdown = document.getElementById(`${type}Autocomplete`);

                    textarea.addEventListener('click', () => {
                        if (!autocompleteState[type].visible) checkAutocomplete(type);
                    });

                    textarea.addEventListener('scroll', () => {
                        if (autocompleteState[type].visible) {
                            const currentWord = getCurrentWord(textarea);
                            if (currentWord.length > 0) positionDropdown(type, textarea, dropdown);
                            else hideAutocomplete(type);
                        }
                    });

                    document.addEventListener('click', (e) => {
                        if (!dropdown.contains(e.target) && e.target !== textarea) hideAutocomplete(type);
                    });
                });
                window.autocompleteListenersAdded = true;
            }

            if (projects.length === 0) {
                document.getElementById('welcomePanel').style.display = '';
                document.getElementById('editorWorkspace').style.display = 'none';
                renderFileList();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.addEventListener('keydown', function(e) {
                if (e.shiftKey && e.altKey && (e.key === 'F' || e.key === 'f')) {
                    e.preventDefault();
                    beautifyCurrentFile();
                    return;
                }
                if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && (e.key === 'f' || e.key === 'F')) {
                    if (currentMainTab !== 'editor') return;
                    e.preventDefault();
                    openFindPanel(getCurrentEditorType(), false);
                    return;
                }
                if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey && (e.key === 'h' || e.key === 'H')) {
                    if (currentMainTab !== 'editor') return;
                    e.preventDefault();
                    openFindPanel(getCurrentEditorType(), true);
                    return;
                }
                if (e.key === 'Escape') {
                    const t = getCurrentEditorType();
                    const panel = document.getElementById(`${t}FindPanel`);
                    if (panel && panel.classList.contains('active')) {
                        e.preventDefault();
                        closeFindPanel(t);
                    }
                }
            });

            ['newFileName', 'newProjectName', 'renameProjectName', 'renameFileName'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        if (id === 'newFileName') createNewFile();
                        else if (id === 'newProjectName') confirmNewProject();
                        else if (id === 'renameProjectName') confirmRenameProject();
                        else if (id === 'renameFileName') renameFile();
                    }
                });
            });

            window.addEventListener('resize', function() {
                if (currentMainTab === 'preview') {
                    const device = document.getElementById('deviceSelect').value;
                    if (device === 'mobile' || device === 'tablet') scalePreview();
                }
                clearTimeout(window.__lnResizeTimer);
                window.__lnResizeTimer = setTimeout(() => {
                    ['html', 'css', 'js'].forEach(t => {
                        if (document.getElementById(`${t}Code`)) handleInput(t);
                    });
                }, 80);
            });

            document.addEventListener('click', function(e) {
                ['html', 'css', 'js'].forEach(type => {
                    if (autocompleteState[type].visible) {
                        const dropdown = document.getElementById(`${type}Autocomplete`);
                        if (dropdown && !dropdown.contains(e.target)) {
                            hideAutocomplete(type);
                        }
                    }
                });
            });

            init();
        });
    </script>
